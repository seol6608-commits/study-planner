<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Study Planner · 일정 확인</title>
<meta name="theme-color" content="#5E87A8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Study Planner" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME TOKENS  (요구된 푸른색 팔레트)
   ============================================================ */
:root{
  --blue-main:#5E87A8;
  --blue-deep:#3F6B8E;
  --blue-bg:#EEF6FA;
  --line:#D7E3EA;
  --line-soft:#E6EEF3;
  --text:#263746;
  --text-sub:#7A8D9B;

  --paper:#FFFFFF;
  --page:#E3ECF2;
  --tt-row:24px;          /* 타임테이블 한 시간 높이 */

  --font-label:'Jost', sans-serif;
  --font-ko:'Gowun Dodum', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-ko);
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 15% -10%, #EFF5F9 0%, transparent 60%),
    radial-gradient(1000px 700px at 110% 120%, #DCE7EE 0%, transparent 55%),
    var(--page);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{
  display:flex;
  min-height:100vh;
  gap:0;
}

/* ---------- SIDEBAR : 월간 캘린더 (날짜 선택) ---------- */
.sidebar{
  width:300px;
  flex:0 0 300px;
  padding:26px 22px;
  border-right:1px solid var(--line);
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(6px);
}
.brand{
  margin-bottom:24px;
}
.brand .mark{
  font-family:var(--font-label);
  font-weight:300;
  letter-spacing:.32em;
  font-size:12px;
  color:var(--blue-main);
  text-transform:uppercase;
}
.brand h1{
  font-weight:400;
  font-size:19px;
  margin-top:4px;
  letter-spacing:.02em;
}
.brand p{
  font-size:12px;
  color:var(--text-sub);
  margin-top:3px;
}

.calendar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px 14px 14px;
  box-shadow:0 1px 0 rgba(94,135,168,.04);
}
.cal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.cal-title{
  font-family:var(--font-label);
  font-weight:400;
  letter-spacing:.12em;
  font-size:14px;
  color:var(--blue-deep);
}
.cal-nav{
  border:1px solid var(--line);
  background:#fff;
  width:28px;height:28px;
  border-radius:8px;
  color:var(--blue-main);
  cursor:pointer;
  font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.cal-nav:hover{background:var(--blue-bg);border-color:var(--blue-main);}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-grid.weekdays{
  margin-bottom:6px;
}
.cal-grid.weekdays span{
  text-align:center;
  font-size:11px;
  letter-spacing:.04em;
  color:var(--text-sub);
  padding:4px 0;
}
.cal-grid.weekdays span.sun{color:#C18A8A;}
.cal-grid.weekdays span.sat{color:#7E96BC;}

.day{
  position:relative;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border-radius:9px;
  cursor:pointer;
  color:var(--text);
  transition:.13s;
  border:1px solid transparent;
}
.day.empty{cursor:default;}
.day:not(.empty):hover{background:var(--blue-bg);}
.day.sun{color:#C49494;}
.day.sat{color:#8197BD;}
.day.today{
  border-color:var(--blue-main);
  font-weight:400;
}
.day.selected{
  background:var(--blue-main);
  color:#fff;
}
.day.selected.sun,.day.selected.sat{color:#fff;}
.day .dot{
  position:absolute;
  bottom:4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--blue-main);
}
.day.selected .dot{background:#fff;}

.legend{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid var(--line-soft);
  display:flex;
  flex-direction:column;
  gap:7px;
  font-size:11px;
  color:var(--text-sub);
}
.legend .row{display:flex;align-items:center;gap:8px;}
.legend .chip{width:16px;height:16px;border-radius:5px;flex:0 0 auto;}
.legend .chip.today{border:1px solid var(--blue-main);}
.legend .chip.sel{background:var(--blue-main);}
.legend .chip.evt{display:flex;align-items:center;justify-content:center;}
.legend .chip.evt::after{content:"";width:4px;height:4px;border-radius:50%;background:var(--blue-main);}

/* ---------- STAGE : 플래너 종이 ---------- */
.stage{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px 26px 60px;
  overflow:auto;
}
.paper{
  width:100%;
  max-width:560px;
  background:var(--paper);
  border-radius:6px;
  box-shadow:0 10px 30px -18px rgba(38,55,70,.35), 0 1px 0 rgba(0,0,0,.02);
  overflow:hidden;
  border:1px solid var(--line-soft);
}
.bar{
  background:var(--blue-main);
  height:22px;
}
.bar.bottom{
  display:flex;align-items:center;justify-content:center;
  height:26px;
}
.bar.bottom span{
  font-family:var(--font-label);
  font-size:9px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:rgba(255,255,255,.8);
}

.sheet{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:30px;
  padding:30px 30px 26px;
}
.col{display:flex;flex-direction:column;}

/* ---------- 공통 필드 ---------- */
.field{margin-bottom:22px;}
.field > h3{
  font-family:var(--font-label);
  font-weight:400;
  letter-spacing:.18em;
  font-size:13px;
  color:var(--text);
  text-transform:uppercase;
  margin-bottom:6px;
}
.field .val{
  min-height:30px;
  border-bottom:1px solid var(--line);
  padding-bottom:8px;
  font-size:14px;
}

/* DATE */
.field.date .val{font-size:16px;letter-spacing:.02em;}

/* D-DAY */
.field.dday .dday-main{
  display:flex;align-items:baseline;gap:8px;
}
.field.dday .dday-tag{
  font-family:var(--font-label);
  font-size:20px;
  font-weight:500;
  color:var(--blue-deep);
  letter-spacing:.04em;
}
.field.dday .dday-title{font-size:13px;color:var(--text);}
.field.dday .dday-list{
  list-style:none;margin-top:8px;
  border-top:1px solid var(--line-soft);padding-top:8px;
}
.field.dday .dday-list li{
  display:flex;align-items:center;gap:8px;
  font-size:12px;padding:3px 0;color:var(--text-sub);
}
.field.dday .dday-list .dl-tag{
  font-family:var(--font-label);
  font-weight:500;color:var(--blue-main);
  font-size:12px;min-width:38px;
}
.field.dday .val.empty-line{border-bottom:1px solid var(--line);min-height:34px;}

/* CONTENTS / TOTAL */
.field.contents .val,.field.total .val{
  color:var(--text-sub);font-size:13px;line-height:1.6;
}
.field.contents .val b,.field.total .val b{color:var(--text);font-weight:400;}

/* TASK */
.field.task > h3,.field.memo > h3,.field.timetable > h3{
  border-bottom:1.5px solid var(--blue-main);
  padding-bottom:6px;
}
.task-body{
  position:relative;
  margin-top:2px;
}
.task-line{
  position:relative;
  height:34px;
  display:flex;align-items:center;
  border-bottom:1px solid var(--line);
  padding:0 2px;
  z-index:2;
}
/* 원본 양식의 옅은 세로 구분선(장식) */
.task-body::after{
  content:"";
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft));
  background-size:1px 100%,1px 100%,1px 100%;
  background-position:58% 0,72% 0,86% 0;
  background-repeat:no-repeat;
  opacity:.7;
  pointer-events:none;
  z-index:1;
}
.task-line .badge{flex:0 0 auto;}
.task-line .t-title{
  font-size:13px;color:var(--text);
  flex:1 1 auto;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-line .t-time{
  margin-left:auto;
  font-family:var(--font-label);
  font-size:11px;color:var(--text-sub);
  letter-spacing:.04em;
  padding-left:8px;
  background:rgba(255,255,255,.85);
}
/* 항목 삭제 버튼 — 기본 숨김(데스크톱은 길게 누르기), 세로 모드에서 노출 */
.task-line .del-x{
  display:none;
  flex:0 0 auto;
  width:26px;height:26px;
  margin-left:6px;
  align-items:center;justify-content:center;
  color:#B6C5D0;font-size:18px;line-height:1;
  border-radius:7px;cursor:pointer;
  z-index:3;
}
.task-line .del-x:active{background:rgba(193,138,138,.15);color:#C18A8A;}

/* 일정 유형 뱃지 (푸른 계열) */
.badge{
  display:inline-block;
  font-size:11px;
  padding:1px 8px;
  border-radius:20px;
  margin-right:8px;
  letter-spacing:.02em;
  white-space:nowrap;
}
.badge.exam{background:rgba(63,107,142,.14);color:var(--blue-deep);}
.badge.assignment{background:rgba(94,135,168,.16);color:#4A7A9E;}
.badge.present{background:rgba(78,134,160,.16);color:#39708A;}
.badge.etc{background:rgba(157,180,196,.20);color:#647C8C;}
.badge.custom{background:rgba(92,147,166,.16);color:#3F7E8E;}
.badge.todo{background:rgba(122,141,155,.16);color:#7A8D9B;}

/* TASK 헤더의 작은 + 버튼 */
.field.task > h3{display:flex;align-items:center;justify-content:space-between;}
.add-btn{
  font-family:var(--font-ko);
  border:1px solid var(--line);
  background:#fff;color:var(--blue-main);
  font-size:11px;letter-spacing:0;
  padding:2px 9px;border-radius:20px;cursor:pointer;
  transition:.15s;
}
.add-btn:hover{background:var(--blue-bg);border-color:var(--blue-main);}

/* 체크박스 */
.chk{
  flex:0 0 auto;
  width:15px;height:15px;
  border:1.5px solid var(--blue-main);
  border-radius:4px;
  margin-right:9px;
  cursor:pointer;
  position:relative;
  background:#fff;
  transition:.13s;
}
.chk:hover{background:var(--blue-bg);}
.chk.checked{background:var(--blue-main);border-color:var(--blue-main);}
.chk.checked::after{
  content:"";
  position:absolute;left:4px;top:1px;
  width:4px;height:8px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(43deg);
}
.task-line.done .t-title{color:var(--text-sub);text-decoration:line-through;}
.task-line.done .badge{opacity:.55;}
.task-line.done .t-time{color:#B6C5D0;}

/* 빠른 할일 입력 줄 */
.task-line.input-line{padding:0;}
.task-line .quick-mark{
  flex:0 0 auto;width:15px;height:15px;margin-right:9px;
  display:flex;align-items:center;justify-content:center;
  color:var(--blue-main);font-size:15px;line-height:1;
}
.quick-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:var(--font-ko);font-size:13px;color:var(--text);
  height:100%;
}
.quick-input::placeholder{color:#B6C5D0;}

/* MEMO (읽기 영역 + 버튼 → 모달 입력) */
.memo-view{
  width:100%;
  min-height:140px;
  margin-top:4px;
  padding:0 2px;
  background:repeating-linear-gradient(
    transparent,transparent 27px,var(--line) 27px,var(--line) 28px);
  line-height:28px;
  font-family:var(--font-ko);
  font-size:13px;color:var(--text);
  white-space:pre-wrap;word-break:break-word;
  cursor:text;
}
.memo-view:empty::before{
  content:attr(data-empty);
  color:#B6C5D0;
}
.field.memo > h3{display:flex;align-items:center;justify-content:space-between;}
.memo-edit{
  font-family:var(--font-ko);
  border:1px solid var(--line);background:#fff;color:var(--blue-main);
  width:24px;height:24px;border-radius:7px;cursor:pointer;font-size:15px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.memo-edit:active{background:var(--blue-bg);}

/* ---------- TIME TABLE ---------- */
.tt{margin-top:2px;}
.tt-grid{
  position:relative;
  border-top:1px solid var(--line-soft);
}
.tt-row{
  display:flex;
  align-items:stretch;
  height:var(--tt-row);
}
.tt-row .tt-h{
  flex:0 0 26px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:8px;
  font-family:var(--font-label);
  font-size:11px;color:var(--text-sub);
  border-bottom:1px solid var(--line-soft);
}
.tt-row .tt-cells{
  flex:1;
  border-left:1px solid var(--line);
  border-bottom:1px solid var(--line-soft);
  background-image:
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft));
  background-size:1px 100%,1px 100%,1px 100%;
  background-position:25% 0,50% 0,75% 0;
  background-repeat:no-repeat;
}
/* 이벤트 블록 오버레이 영역 (라벨 26px 이후부터) */
.tt-blocks{
  position:absolute;
  top:0;left:26px;right:0;bottom:0;
  pointer-events:none;
}
.tt-block{
  position:absolute;
  left:3px;right:3px;
  border-radius:5px;
  padding:2px 6px;
  overflow:hidden;
  font-size:10.5px;
  line-height:1.25;
  color:#fff;
  box-shadow:0 1px 2px rgba(38,55,70,.12);
}
.tt-block .b-title{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;
}
.tt-block .b-time{
  font-family:var(--font-label);
  font-size:9px;opacity:.85;letter-spacing:.03em;
}
.tt-block.exam{background:var(--blue-deep);}
.tt-block.assignment{background:var(--blue-main);}
.tt-block.present{background:#4E86A0;}
.tt-block.etc{background:#8AA6BC;}
.tt-block.custom{background:#5C93A6;}
.tt-block.done{opacity:.4;}
.tt-block.done .b-title{text-decoration:line-through;}
/* 유형 변경 가능한 뱃지 */
.badge.editable{cursor:pointer;}
.badge.editable::after{content:" ⌄";opacity:.5;font-size:9px;}
.type-opts{display:flex;flex-wrap:wrap;gap:8px;}
.type-opt{
  flex:1 1 40%;
  font-family:var(--font-ko);font-size:14px;
  padding:11px 0;border-radius:10px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--text);
}
.type-opt:hover{background:var(--blue-bg);border-color:var(--blue-main);}
.type-opt.cur{background:var(--blue-main);color:#fff;border-color:var(--blue-main);}

/* ============================================================
   세로 모드 전용 추가 버튼 (FAB) + 길게 누르기 표시 — 기본값
   ============================================================ */
.fab-bar{ display:none; }
.cal-memo{ display:none; }   /* 세로(폰) 모드에서만 표시 */
.fab-bar button{
  flex:1;
  font-family:var(--font-ko);
  font-size:14px;
  padding:13px 0;
  border-radius:12px;
  border:none;cursor:pointer;
  box-shadow:0 6px 18px -8px rgba(38,55,70,.5);
}
.fab-bar .fab-todo{background:#fff;color:var(--blue-deep);border:1px solid var(--blue-main);}
.fab-bar .fab-event{background:var(--blue-main);color:#fff;}
.task-line.pressing{background:var(--blue-bg);}
.del-hint{
  font-size:10.5px;color:#B6C5D0;margin-top:6px;text-align:center;letter-spacing:.02em;
}

/* 일정/할일 분리 — 기본(가로)은 좌우 2단 */
.task-tabs{display:none;}
.task-cols{display:flex;gap:16px;}
.task-col{flex:1 1 0;min-width:0;display:flex;flex-direction:column;}
.task-col-label{
  font-family:var(--font-label);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-sub);margin:0 0 4px;
}
.task-tab{
  flex:1;font-family:var(--font-ko);font-size:13px;
  padding:7px 0;border:1px solid var(--line);background:#fff;color:var(--text-sub);
  border-radius:9px;cursor:pointer;
}
.task-tab.active{background:var(--blue-main);color:#fff;border-color:var(--blue-main);}

/* ============================================================
   STACKED  (태블릿 세로 등 860px 이하) — 위아래 배치 + FAB
   ============================================================ */
@media (max-width:860px){
  .app{flex-direction:column;}
  .sidebar{
    width:100%;flex:none;
    border-right:none;border-bottom:1px solid var(--line);
    padding:18px 16px;
  }
  .brand{margin-bottom:16px;}
  .calendar{max-width:420px;margin:0 auto;}
  .stage{
    padding:18px 14px 96px;       /* 하단 FAB 공간 */
    overflow-y:auto;
  }

  /* 인라인 추가 UI는 숨기고 FAB로 분리 동작 */
  .field.task > h3 .add-btn{display:none;}
  .task-line.input-line{display:none;}

  .fab-bar{
    display:flex;
    gap:10px;
    position:fixed;
    left:0;right:0;bottom:0;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(227,236,242,.96) 70%, rgba(227,236,242,0));
    z-index:80;
  }
}

/* ============================================================
   PHONE 세로 전용 (≤600px)
   스크롤 없이 한 화면 · 폰트 축소 · 할일/일정확인/일정추가에 포커스
   ============================================================ */
@media (max-width:600px){
  html,body{height:100%;overflow:hidden;}     /* 페이지 스크롤 제거 */
  .app{height:100vh;}

  /* 캘린더(날짜 선택)는 더 컴팩트하게 — TASK 공간 확보 */
  .sidebar{
    flex:0 0 auto;padding:8px 14px 6px;
    display:flex;flex-wrap:wrap;align-items:stretch;column-gap:10px;row-gap:0;
  }
  .brand{flex:0 0 100%;margin-bottom:6px;}
  .brand .mark{font-size:10px;letter-spacing:.24em;}
  .brand h1{font-size:14px;margin-top:2px;}
  .brand p{display:none;}
  .gcal-box{margin-top:7px;}
  .gcal-btn{padding:7px 10px;font-size:12px;border-radius:9px;}
  .gcal-refresh{width:34px;font-size:15px;border-radius:9px;}
  .gcal-status{font-size:10px;margin-top:3px;min-height:0;}

  /* 상단을 좌(캘린더) · 우(메모) 2단으로 */
  .calendar{
    flex:1 1 0;min-width:0;
    max-width:none;padding:7px 8px 5px;border-radius:11px;margin-top:0;
  }
  .cal-memo{
    display:flex;flex-direction:column;
    flex:1 1 0;min-width:0;
    background:#fff;border:1px solid var(--line);border-radius:11px;
    padding:7px 9px;
  }
  .cm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .cm-label{
    font-family:var(--font-label);font-size:10px;letter-spacing:.16em;color:var(--text);
  }
  .cal-memo .memo-edit{width:22px;height:22px;font-size:14px;}
  .cal-memo .memo-view{
    flex:1;min-height:0;margin-top:0;
    background:repeating-linear-gradient(transparent,transparent 23px,var(--line) 23px,var(--line) 24px);
    line-height:24px;font-size:13px;
    overflow-y:auto;
  }
  .cal-head{margin-bottom:5px;}

<script>
/* ============================================================================

const TYPE_LABEL = { exam:"시험", assignment:"과제", present:"발표", etc:"기타", custom:"기타", todo:"할일" };
const TYPE_PRIORITY = { exam:0, assignment:1, present:2, etc:3, custom:4, todo:5 }; // 시험·과제·발표 우선

const SAMPLE_EVENTS = [
  // 기본 일정 없음 — 사용자가 추가한 일정/할일만 표시됩니다.
];

/* ============================================================================
 *  2. 저장소 어댑터 계층
 *  - 지금은 LocalStorage 사용
 *  - 나중에 Firebase / Supabase 로 교체할 수 있도록 동일 인터페이스로 분리
 * ========================================================================== */
const LocalStorageAdapter = {
  _note:(date)=>`planner:note:${date}`,
  _USER_EVENTS:"planner:userEvents",
  _DONE:"planner:doneMap",
  getDayNote(date){
    try { return localStorage.getItem(this._note(date)) || ""; }
    catch(e){ return ""; }
  },
  setDayNote(date, text){
    try { localStorage.setItem(this._note(date), text); } catch(e){}
  },
  getUserEvents(){
    try { return JSON.parse(localStorage.getItem(this._USER_EVENTS) || "[]"); }
    catch(e){ return []; }
  },
  setUserEvents(arr){
    try { localStorage.setItem(this._USER_EVENTS, JSON.stringify(arr)); } catch(e){}
  },
  getDoneMap(){
    try { return JSON.parse(localStorage.getItem(this._DONE) || "{}"); }
    catch(e){ return {}; }
  },
  setDoneMap(map){
    try { localStorage.setItem(this._DONE, JSON.stringify(map)); } catch(e){}
  },
  getDeleted(){
    try { return JSON.parse(localStorage.getItem("planner:deleted") || "[]"); }
    catch(e){ return []; }
  },
  setDeleted(arr){
    try { localStorage.setItem("planner:deleted", JSON.stringify(arr)); } catch(e){}
  },
  getTypeMap(){
    try { return JSON.parse(localStorage.getItem("planner:typeMap") || "{}"); }
    catch(e){ return {}; }
  },
  setTypeMap(map){
    try { localStorage.setItem("planner:typeMap", JSON.stringify(map)); } catch(e){}
  }
};

/* 향후 클라우드 동기화 어댑터 (갤럭시 ↔ 아이패드 동일 데이터) — 인터페이스만 정의 */
const CloudSyncAdapter = {
  async getDayNote(date){ /* TODO: Firestore/Supabase 에서 읽기 */ return ""; },
  async setDayNote(date, text){ /* TODO: Firestore/Supabase 에 쓰기 */ },
  async getUserEvents(){ /* TODO: 원격 events 컬렉션 읽기 */ return []; },
  async setUserEvents(arr){ /* TODO: 원격에 쓰기/동기화 */ },
  async getDoneMap(){ /* TODO */ return {}; },
  async setDoneMap(map){ /* TODO */ },
  async getDeleted(){ /* TODO */ return []; },
  async setDeleted(arr){ /* TODO */ },
  async getTypeMap(){ /* TODO */ return {}; },
  async setTypeMap(map){ /* TODO */ },
  async fetchEvents(){ /* TODO: 원격 events 컬렉션 읽기 */ return []; }
};

/* 사용자가 지정한 유형(자동분류보다 우선) — id 기준 */
let typeOverrides = {};

/* 현재 활성 저장소 — 이 줄만 바꾸면 전체가 클라우드로 전환됨 */
const Storage = LocalStorageAdapter;

/* ============================================================================
 *  3. 이벤트 스토어
 * ========================================================================== */
const EventsStore = {
  events: [],
  googleEvents: [],
  googleTasks: [],
  doneMap: {},
  load(){
    const deleted = new Set(Storage.getDeleted());
    const user = Storage.getUserEvents();          // 사용자가 추가한 일정/할일
    this.events = SAMPLE_EVENTS.filter(e => !deleted.has(e.id)).concat(user);
    this.doneMap = Storage.getDoneMap();            // 완료 체크 상태
    this.events.forEach(e => { e.done = !!this.doneMap[e.id]; });
  },
  setGoogleEvents(arr){
    this.googleEvents = arr || [];
    // 구글 일정: ✓ 표시(normalize의 done)가 기준, 로컬 doneMap은 보조
    this.googleEvents.forEach(e => { e.done = e.done || !!this.doneMap[e.id]; });
  },
  setGoogleTasks(arr){
    this.googleTasks = arr || [];   // 완료 상태는 구글 Tasks가 기준(그대로 사용)
  },
  _all(){ return this.events.concat(this.googleEvents).concat(this.googleTasks); },
  persistUser(){
    // 샘플을 제외한 사용자 생성분만 저장
    Storage.setUserEvents(this.events.filter(e => String(e.id).startsWith("u-")));
  },
  getAll(){ return this._all(); },
  getByDate(date){ return this._all().filter(e => e.date === date); },
  addEvent(evt){
    evt.id = "u-" + Date.now() + "-" + Math.floor(Math.random()*1000);
    evt.done = false;
    this.events.push(evt);
    this.persistUser();
    return evt;
  },
  addTodo(date, title){
    return this.addEvent({ title, type:"todo", date, source:"local" });
  },
  removeEvent(id){
    this.events = this.events.filter(e => e.id !== id);
    this.googleEvents = this.googleEvents.filter(e => e.id !== id);
    if(this.doneMap[id]){ delete this.doneMap[id]; Storage.setDoneMap(this.doneMap); }
    if(!String(id).startsWith("u-")){            // 샘플/구글 삭제도 화면상 유지되도록 기록
      const del = Storage.getDeleted();
      if(!del.includes(id)){ del.push(id); Storage.setDeleted(del); }
    }
    this.persistUser();
  },
  toggleDone(id){
    const e = this._all().find(x => x.id === id);
    if(!e) return;
    e.done = !e.done;
    if(e.done) this.doneMap[id] = true; else delete this.doneMap[id];
    Storage.setDoneMap(this.doneMap);
  },
  getUpcoming(fromDate, types){
    return this._all()
      .filter(e => e.date >= fromDate)
      .filter(e => !types || types.includes(e.type))
      .sort((a,b)=> a.date === b.date
        ? TYPE_PRIORITY[a.type] - TYPE_PRIORITY[b.type]
        : a.date.localeCompare(b.date));
  }
};

const TYPE_TAGS = { exam:'[시험]', assignment:'[과제]', present:'[발표]', etc:'[기타]' };
/* 제목 앞 유형 태그 제거(표시·재태깅용) */
function stripTypeTag(s){
  return (s || '').replace(/^\s*\[\s*(시험|과제|발표|기타)\s*\]\s*/, '').trim();
}
/* 유형 자동 분류: 대괄호 태그 우선 → 키워드 추론 → 기타 */
function classifyType(title, desc){
  const raw = ((title||'') + ' ' + (desc||''));
  const t = raw.toLowerCase();
  const has = (arr)=>arr.some(k => t.includes(k));
  if(/\[\s*시험\s*\]/.test(raw)) return 'exam';
  if(/\[\s*과제\s*\]/.test(raw)) return 'assignment';
  if(/\[\s*발표\s*\]/.test(raw)) return 'present';
  if(/\[\s*기타\s*\]/.test(raw)) return 'etc';
  if(has(['시험','고사','중간','기말','exam','test','quiz','퀴즈'])) return 'exam';
  if(has(['과제','숙제','제출','레포트','리포트','assignment','homework','hw','due'])) return 'assignment';
  // 발표 관련 키워드(PT 제외)
  if(has(['발표회','구두발표','조별발표','팀발표','발표','프레젠테이션','presentation','세미나','브리핑'])) return 'present';
  return 'etc';
}

function normalizeGoogleCalendarEvent(raw){
  // Google Calendar 이벤트 -> 내부 스키마로 변환
  const start = raw?.start?.dateTime || raw?.start?.date || "";
  const end   = raw?.end?.dateTime   || raw?.end?.date   || "";
  const timed = start.length > 10;
  const rawSummary = raw.summary || '';
  const doneMark = /^\s*✓\s*/.test(rawSummary);            // 완료 표시(✓) 인식
  const clean = rawSummary.replace(/^\s*✓\s*/, '');        // ✓ 제거
  return {
    id: raw.id,
    title: stripTypeTag(clean) || "(제목 없음)",            // 표시용 제목(✓·태그 제거)
    type: typeOverrides[raw.id] || classifyType(clean, raw.description),  // 사용자 지정 우선
    date: (start || "").slice(0,10),
    startTime: timed ? start.slice(11,16) : undefined,
    endTime:   end.length>10 ? end.slice(11,16) : undefined,
    memo: raw.description || "",
    done: doneMark,                                         // ✓ 기준(두 기기 공유)
    source: "google-calendar"
  };
}

async function fetchGoogleCalendarEvents(timeMin, timeMax){
  if(!accessToken) return [];
  const params = new URLSearchParams({
    timeMin, timeMax,
    singleEvents: 'true',
    orderBy: 'startTime',
    maxResults: '250'
  });
  const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?' + params.toString();
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if(!res.ok){
    if(res.status === 401){ accessToken = null; tokenExpiry = 0; updateAuthUI(); }
    throw new Error('Calendar fetch failed: ' + res.status);
  }
  const data = await res.json();
  return (data.items || []).map(normalizeGoogleCalendarEvent).filter(e => e.date);
}

/* 다음날(YYYY-MM-DD) — 종일 일정 end.date(배타적)용 */
function nextDayStr(dateStr){
  const d = parseDate(dateStr); d.setDate(d.getDate()+1); return fmt(d);
}
/* 내부 일정 → 구글 이벤트 본문. 유형은 제목 태그로 보존 */
function toGoogleBody(evt){
  const tag = TYPE_TAGS[evt.type] ? TYPE_TAGS[evt.type] + ' ' : '';
  const body = {
    summary: tag + stripTypeTag(evt.title || ''),
    description: evt.memo || ''
  };
  if(evt.startTime && evt.endTime){
    body.start = { dateTime: `${evt.date}T${evt.startTime}:00`, timeZone: 'Asia/Seoul' };
    body.end   = { dateTime: `${evt.date}T${evt.endTime}:00`,   timeZone: 'Asia/Seoul' };
  } else {
    body.start = { date: evt.date };
    body.end   = { date: nextDayStr(evt.date) };
  }
  return body;
}

/* ===== 메모 ↔ 구글 Drive 앱 전용 숨김폴더(appDataFolder) ===== */
const DRIVE_FILES  = 'https://www.googleapis.com/drive/v3/files';

const NOTES_FILENAME = 'planner-notes.json';
let notesFileId = null;
let notesSaveTimer = null;

function collectLocalNotes(){
  const o = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf('planner:note:') === 0){
      const date = k.slice('planner:note:'.length);
      const v = localStorage.getItem(k);
      if(v) o[date] = v;
    }
  }
  return o;
}
function applyNotes(obj){
  Object.keys(obj || {}).forEach(date=>{
    if(obj[date]) localStorage.setItem('planner:note:'+date, obj[date]);
  });
}
async function gdriveFindNotes(){
  const q = encodeURIComponent("name='" + NOTES_FILENAME + "'");
  const url = DRIVE_FILES + '?spaces=appDataFolder&q=' + q + '&fields=files(id,name)';
  const res = await fetch(url, { headers:{ Authorization:'Bearer '+accessToken } });
  if(!res.ok){
    if(res.status === 401){ accessToken=null; tokenExpiry=0; updateAuthUI(); }
    throw new Error('Drive find failed: '+res.status);
  }
  const data = await res.json();
  notesFileId = (data.files && data.files[0]) ? data.files[0].id : null;
  return notesFileId;

async function gdriveLoadNotes(){
  if(!isTokenValid()) return;
  try{
    if(!notesFileId) await gdriveFindNotes();
    if(!notesFileId) return;   // 아직 저장된 메모 파일 없음
    const res = await fetch(DRIVE_FILES + '/' + notesFileId + '?alt=media', { headers:{ Authorization:'Bearer '+accessToken } });
    if(!res.ok) throw new Error('Drive load failed: '+res.status);
    const obj = await res.json();
    applyNotes(obj);

}
async function gdriveSaveNotes(){
  if(!isTokenValid()) return;
  const content = JSON.stringify(collectLocalNotes());
  try{
    if(notesFileId === null) await gdriveFindNotes();
    if(notesFileId){
      await fetch(DRIVE_UPLOAD + '/' + notesFileId + '?uploadType=media', {
        method:'PATCH',
        headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
        body: content
      });
    } else {
      const boundary = '----planner' + Date.now();
      const meta = { name: NOTES_FILENAME, parents:['appDataFolder'] };
      const body =
        '--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+
        '\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+content+
        '\r\n--'+boundary+'--';
      const res = await fetch(DRIVE_UPLOAD + '?uploadType=multipart&fields=id', {
        method:'POST',
        headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'multipart/related; boundary='+boundary },
        body
      });
      if(res.ok){ const data = await res.json(); notesFileId = data.id; }
    }
  }catch(e){ console.log('메모 저장 건너뜀', e); }
}

function calculateDday(eventDate, fromDate){
  const a = parseDate(fromDate || todayStr());
  const b = parseDate(eventDate);
  return Math.round((b - a) / 86400000);
}

function renderCalendar(){
  const {year, month} = AppState.view;
  document.getElementById('calTitle').textContent = `${year}. ${month+1}`;
  const wrap = document.getElementById('calDays');
  wrap.innerHTML = '';

  const first = new Date(year, month, 1).getDay();
  const days  = new Date(year, month+1, 0).getDate();

  // 일정이 있는 날짜 집합
  const evtDates = new Set(EventsStore.getAll()
    .filter(e => e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`))
    .map(e => e.date));

  for(let i=0;i<first;i++){
    const c=document.createElement('div'); c.className='day empty'; wrap.appendChild(c);
  }
  for(let d=1; d<=days; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month, d).getDay();
    const cell = document.createElement('div');
    cell.className = 'day' + (dow===0?' sun':'') + (dow===6?' sat':'');
    if(dateStr === todayStr())            cell.classList.add('today');
    if(dateStr === AppState.selectedDate) cell.classList.add('selected');
    cell.textContent = d;
    if(evtDates.has(dateStr)){ const dot=document.createElement('span'); dot.className='dot'; cell.appendChild(dot); }
    cell.addEventListener('click', ()=>{ AppState.selectedDate = dateStr; renderCalendar(); renderPlannerPage(dateStr); });
    wrap.appendChild(cell);
  }
}

function renderPlannerPage(date){
  const events = getEventsByDate(date);
  const d = parseDate(date);

  /* DATE */
  document.getElementById('fDate').textContent =
    `${date.replace(/-/g,'. ')} (${WK[d.getDay()]})`;

  /* CONTENTS — 그날 일정 요약 */
  const counts = {exam:0, assignment:0, etc:0, custom:0, todo:0};
  events.forEach(e => counts[e.type]++);
  const contentsEl = document.getElementById('fContents');
  if(events.length){
    const parts = [];
    if(counts.exam)       parts.push(`시험 ${counts.exam}`);
    if(counts.assignment) parts.push(`과제 ${counts.assignment}`);
    if(counts.etc)        parts.push(`기타 ${counts.etc}`);
    if(counts.custom)     parts.push(`개인 ${counts.custom}`);
    if(counts.todo)       parts.push(`할일 ${counts.todo}`);
    contentsEl.innerHTML = `오늘 항목 <b>${events.length}개</b> · ${parts.join(' · ')}`;
  } else {
    contentsEl.innerHTML = `<span style="color:#B6C5D0">등록된 일정 없음</span>`;
  }

  /* TOTAL — 완료 현황 + 시간 블록 총합 */
  const doneCount = events.filter(e => e.done).length;
  let totalMin = 0;
  events.forEach(e => { if(e.startTime && e.endTime) totalMin += toMin(e.endTime) - toMin(e.startTime); });
  const h = Math.floor(totalMin/60), m = totalMin%60;
  const totalEl = document.getElementById('fTotal');
  if(events.length){
    totalEl.innerHTML = `완료 <b>${doneCount} / ${events.length}</b>`
      + (totalMin>0 ? ` · 시간 블록 ${h?h+'h ':''}${m}m` : '');
  } else {
    totalEl.innerHTML = '';
  }

  /* D-DAY — 선택일 기준 가장 가까운 주요 일정 (시험·과제·기타 우선, 개인 일정 제외) */
  renderDday(date);

  /* TASK — 그날 일정 목록을 줄 위에 표시 */
  renderTask(events);

  /* MEMO — 저장소에서 불러와 표시 */
  const note = Storage.getDayNote(date);
  document.getElementById('fMemo').textContent = note;
  document.getElementById('fMemoMobile').textContent = note;

  /* TIME TABLE */
  renderTimeTable(events);
}

function renderDday(date){
  const upcoming = getUpcomingEvents(date, ['exam','assignment','present','etc']);
  const el = document.getElementById('fDday');
  if(!upcoming.length){ el.innerHTML = `<div class="val empty-line"></div>`; return; }

  const head = upcoming[0];
  const rest = upcoming.slice(1,4);
  let html = `<div class="dday-main">
      <span class="dday-tag">${ddayLabel(calculateDday(head.date, date))}</span>
      <span class="dday-title">${displayTitle(head)}</span>
    </div>`;
  if(rest.length){
    html += `<ul class="dday-list">` + rest.map(e =>
      `<li><span class="dl-tag">${ddayLabel(calculateDday(e.date, date))}</span>${displayTitle(e)}</li>`
    ).join('') + `</ul>`;
  }
  el.innerHTML = html;
}

      chk.classList.toggle('checked', e.done);
      line.classList.toggle('done', e.done);
      if(e.done) EventsStore.doneMap[e.id] = true; else delete EventsStore.doneMap[e.id];
      Storage.setDoneMap(EventsStore.doneMap);
      gcalPatchEvent(e.id, { summary: buildSummaryDoneMark(e, e.done) }).catch(err=> console.error(err));
    } else {
      EventsStore.toggleDone(e.id);
      renderPlannerPage(AppState.selectedDate);
    }
  });
  line.appendChild(chk);

  if(showBadge){
    const badge = document.createElement('span');
    badge.className = 'badge editable ' + e.type;
    badge.textContent = (e.type==='custom' && e.customType) ? e.customType : TYPE_LABEL[e.type];
    badge.title = '유형 변경';
    ['mousedown','touchstart'].forEach(ev => badge.addEventListener(ev, x=>x.stopPropagation()));
    badge.addEventListener('click', (x)=>{ x.stopPropagation(); openTypePicker(e); });
    line.appendChild(badge);
  }

  const title = document.createElement('span');
  title.className = 't-title';
  title.textContent = e.title;
  line.appendChild(title);

  if(timeTxt){
    const tm = document.createElement('span');
    tm.className = 't-time';
    tm.textContent = timeTxt;
    line.appendChild(tm);
  }

  const doDelete = ()=>{
    if(!confirm(`"${e.title}" 항목을 삭제할까요?`)) return;
    if(e.source === 'google-calendar' && isTokenValid()){
      // 구글 일정 → 구글에서 삭제 후 다시 동기화
      setSyncStatus('구글에서 삭제 중…');
      gcalDeleteEvent(e.id)
        .then(()=> syncFromGoogle())
        .catch(err=>{ console.error(err); setSyncStatus('구글 삭제 실패 — 다시 시도', true); });
    } else if(e.source === 'google-tasks' && isTokenValid()){
      // 구글 할일 → Tasks에서 삭제 후 갱신
      gtaskDelete(e.id).then(()=> syncTasks()).catch(err=> console.error(err));
    } else {
      // 로컬 항목(할일·로컬 일정) → 로컬 삭제
      EventsStore.removeEvent(e.id);
      renderCalendar();
      renderPlannerPage(AppState.selectedDate);
    }
  };
  const del = document.createElement('span');
  del.className = 'del-x'; del.textContent = '×'; del.title = '삭제';
  ['mousedown','touchstart'].forEach(ev => del.addEventListener(ev, x=>x.stopPropagation()));
  del.addEventListener('click', (x)=>{ x.stopPropagation(); doDelete(); });
  line.appendChild(del);

  attachLongPress(line, doDelete);
  return line;
}

function sortItems(arr){
  return arr.slice().sort((a,b)=>{
    if(!!a.done !== !!b.done) return a.done ? 1 : -1;
    const ta=a.startTime||'99:99', tb=b.startTime||'99:99';
    return ta===tb ? TYPE_PRIORITY[a.type]-TYPE_PRIORITY[b.type] : ta.localeCompare(tb);
  });
}
function fillEmptyLines(wrap, used, min){
  for(let i=used; i<min; i++){
    const empty = document.createElement('div');
    empty.className = 'task-line';
    wrap.appendChild(empty);
  }
}

function renderTask(events){
  const evWrap = document.getElementById('fTaskEvent');
  const tdWrap = document.getElementById('fTaskTodo');
  evWrap.innerHTML = '';
  tdWrap.innerHTML = '';

  const eventItems = sortItems(events.filter(e => e.type !== 'todo'));  // 일정(시험/과제/기타/구글)
  const todoItems  = sortItems(events.filter(e => e.type === 'todo'));  // 할일

  // 일정 구역 (뱃지 표시)
  eventItems.forEach(e => evWrap.appendChild(buildTaskLine(e, true)));
  fillEmptyLines(evWrap, eventItems.length, 6);
  if(eventItems.length){
    const hint = document.createElement('div');
    hint.className = 'del-hint';
    hint.textContent = '※ 항목을 길게 누르면 삭제됩니다';
    evWrap.appendChild(hint);
  }

  // 할일 구역 (뱃지 없음) + 빠른 입력
  todoItems.forEach(e => tdWrap.appendChild(buildTaskLine(e, false)));

  const inputLine = document.createElement('div');
  inputLine.className = 'task-line input-line';
  const mark = document.createElement('span');
  mark.className = 'quick-mark'; mark.textContent = '+';
  const input = document.createElement('input');
  input.className = 'quick-input';
  input.type = 'text';
  input.placeholder = '할일 입력 후 Enter';
  input.addEventListener('keydown', (ev)=>{
    if(ev.key === 'Enter' && input.value.trim()){
      addTodoSmart(AppState.selectedDate, input.value.trim())
        .then(()=>{ const qi=document.querySelector('#fTaskTodo .quick-input'); if(qi) qi.focus(); });
    }
  });
  inputLine.appendChild(mark);
  inputLine.appendChild(input);
  tdWrap.appendChild(inputLine);
  fillEmptyLines(tdWrap, todoItems.length + 1, 6);
}

function renderTimeTable(events){
  const wrap = document.getElementById('fTime');
  // 6시 ~ 다음날 3시 (총 22행). 라벨: 6..12, 1..12, 1..3
  const hours = [];
  for(let h=6; h<=24+3; h++) hours.push(((h-1)%12)+1);

  let rows = '';
  hours.forEach(label => {
    rows += `<div class="tt-row"><span class="tt-h">${label}</span><div class="tt-cells"></div></div>`;
  });

  // 이벤트 블록 (10분 단위 정밀 배치, 06:00 기준)
  const SPAN = 22 * 60;                       // 06:00 → 04:00 = 1320분
  let blocks = '';
  events.filter(e => e.startTime && e.endTime).forEach(e => {
    const s = minutesSince6(e.startTime);
    const en = minutesSince6(e.endTime);
    if(s == null || en == null || en <= s) return;
    const top = (s/SPAN)*100;
    const hgt = ((en-s)/SPAN)*100;
    blocks += `<div class="tt-block ${e.type}${e.done?' done':''}" style="top:${top}%;height:${hgt}%;">
        <div class="b-title">${displayTitle(e)}</div>
        <div class="b-time">${e.startTime}–${e.endTime}</div>
      </div>`;
  });

  wrap.innerHTML = `<div class="tt-grid">${rows}<div class="tt-blocks">${blocks}</div></div>`;
}

/* ---------- 보조 함수 ---------- */
function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function minutesSince6(t){
  const v = toMin(t);
  return ((v - 360) + 1440) % 1440;   // 06:00=0 / 새벽시간은 아래쪽으로
}
function displayTitle(e){
  return e.type==='custom' && e.customType ? `${e.title}` : e.title;
}

/* 길게 누르기 (터치/마우스 공통) — 삭제 트리거 */
function attachLongPress(el, onLong){
  let timer = null;
  const start = ()=>{
    el.classList.add('pressing');
    timer = setTimeout(()=>{ el.classList.remove('pressing'); onLong(); }, 550);
  };
  const cancel = ()=>{ clearTimeout(timer); el.classList.remove('pressing'); };
  el.addEventListener('touchstart', start, {passive:true});
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchmove', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

/* ---------- 구글 연동 동작 ---------- */
function setSyncStatus(msg, isErr){
  const el = document.getElementById('gcalStatus');
  el.textContent = msg || '';
  el.classList.toggle('err', !!isErr);
}
function updateAuthUI(){
  const btn = document.getElementById('gcalBtn');
  if(accessToken){
    btn.textContent = '구글 캘린더 연결 해제';
    btn.classList.add('connected');
  } else {
    btn.textContent = '구글 캘린더 연결';
    btn.classList.remove('connected');
  }
}
function initGoogleAuth(){
  if(!(window.google && google.accounts && google.accounts.oauth2)){
    return setTimeout(initGoogleAuth, 300);   // 스크립트 로딩 대기
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPE,
    callback: (resp)=>{
      if(resp && resp.error){
        // 조용한 재연결 실패 등
        setSyncStatus('다시 연결이 필요해요', true);
        return;
      }
      accessToken = resp.access_token;
      saveToken(resp.access_token, resp.expires_in);
      updateAuthUI();
      syncFromGoogle();
    }
  });
  updateAuthUI();
  // 이전에 연결했었는데 저장된 토큰이 만료됐으면 → 조용히 재연결 시도(터치 없이)
  if(!isTokenValid() && wasConnected()){
    setSyncStatus('자동 재연결 중…');
    try{ tokenClient.requestAccessToken({ prompt: '' }); }catch(e){}
  }
}
function isTokenValid(){ return !!accessToken && tokenExpiry > Date.now() + 30000; }
function signIn(){
  if(!tokenClient){ setSyncStatus('잠시 후 다시 시도'); initGoogleAuth(); return; }
  tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
}
function signOut(){
  if(accessToken && window.google && google.accounts && google.accounts.oauth2){
    google.accounts.oauth2.revoke(accessToken, ()=>{});
  }
  accessToken = null; tokenExpiry = 0;
  clearToken();
  EventsStore.setGoogleEvents([]);
  EventsStore.setGoogleTasks([]);
  updateAuthUI();
  setSyncStatus('');
  renderCalendar();
  renderPlannerPage(AppState.selectedDate);
}
async function syncFromGoogle(){
  // 토큰 없거나 만료 → 조용히 재연결 시도
  if(!isTokenValid()){
    if(tokenClient && wasConnected()){ setSyncStatus('자동 재연결 중…'); tokenClient.requestAccessToken({ prompt: '' }); }
    else { setSyncStatus('구글 캘린더를 연결하세요'); }
    return;
  }
  const {year, month} = AppState.view;
  const min = new Date(year, month-1, 1).toISOString();   // 한 달 전부터
  const max = new Date(year, month+2, 1).toISOString();   // 두 달 후까지
  const refreshBtn = document.getElementById('gcalRefresh');
  try{
    refreshBtn.classList.add('spin');
    setSyncStatus('동기화 중…');
    const events = await fetchGoogleCalendarEvents(min, max);
    EventsStore.setGoogleEvents(events);
    // 할일(Tasks)도 함께 (권한 없으면 조용히 건너뜀)
    let taskCount = 0;
    try{ const tasks = await gtasksList(); EventsStore.setGoogleTasks(tasks); taskCount = tasks.length; }
    catch(te){ console.log('Tasks 동기화 건너뜀', te); }
    // 메모(Drive 숨김폴더)도 함께 불러오기
    gdriveLoadNotes();
    setSyncStatus(`구글 연결됨 · 일정 ${events.length} · 할일 ${taskCount}`);
    renderCalendar();
    renderPlannerPage(AppState.selectedDate);
  }catch(err){
    console.error(err);
    setSyncStatus('동기화 실패 — 새로고침을 눌러보세요', true);
  }finally{
    refreshBtn.classList.remove('spin');
  }
}
document.getElementById('gcalBtn').addEventListener('click', ()=>{
  if(accessToken) signOut(); else signIn();
});
document.getElementById('gcalRefresh').addEventListener('click', ()=>{
  if(isTokenValid()) syncFromGoogle();
  else if(wasConnected() && tokenClient) tokenClient.requestAccessToken({ prompt: '' });
  else signIn();
});
