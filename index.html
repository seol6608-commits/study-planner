<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Study Planner · 일정 확인</title>
<meta name="theme-color" content="#5E87A8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Study Planner" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME TOKENS  (요구된 푸른색 팔레트)
   ============================================================ */
:root{
  --blue-main:#5E87A8;
  --blue-deep:#3F6B8E;
  --blue-bg:#EEF6FA;
  --line:#D7E3EA;
  --line-soft:#E6EEF3;
  --text:#263746;
  --text-sub:#7A8D9B;

  --paper:#FFFFFF;
  --page:#E3ECF2;
  --tt-row:24px;          /* 타임테이블 한 시간 높이 */

  --font-label:'Jost', sans-serif;
  --font-ko:'Gowun Dodum', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-ko);
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 15% -10%, #EFF5F9 0%, transparent 60%),
    radial-gradient(1000px 700px at 110% 120%, #DCE7EE 0%, transparent 55%),
    var(--page);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{
  display:flex;
  min-height:100vh;
  gap:0;
}

/* ---------- SIDEBAR : 월간 캘린더 (날짜 선택) ---------- */
.sidebar{
  width:300px;
  flex:0 0 300px;
  padding:26px 22px;
  border-right:1px solid var(--line);
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(6px);
}
.brand{
  margin-bottom:24px;
}
.brand .mark{
  font-family:var(--font-label);
  font-weight:300;
  letter-spacing:.32em;
  font-size:12px;
  color:var(--blue-main);
  text-transform:uppercase;
}
.brand h1{
  font-weight:400;
  font-size:19px;
  margin-top:4px;
  letter-spacing:.02em;
}
.brand p{
  font-size:12px;
  color:var(--text-sub);
  margin-top:3px;
}

.calendar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px 14px 14px;
  box-shadow:0 1px 0 rgba(94,135,168,.04);
}
.cal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.cal-title{
  font-family:var(--font-label);
  font-weight:400;
  letter-spacing:.12em;
  font-size:14px;
  color:var(--blue-deep);
}
.cal-nav{
  border:1px solid var(--line);
  background:#fff;
  width:28px;height:28px;
  border-radius:8px;
  color:var(--blue-main);
  cursor:pointer;
  font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.cal-nav:hover{background:var(--blue-bg);border-color:var(--blue-main);}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-grid.weekdays{
  margin-bottom:6px;
}
.cal-grid.weekdays span{
  text-align:center;
  font-size:11px;
  letter-spacing:.04em;
  color:var(--text-sub);
  padding:4px 0;
}
.cal-grid.weekdays span.sun{color:#C18A8A;}
.cal-grid.weekdays span.sat{color:#7E96BC;}

.day{
  position:relative;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border-radius:9px;
  cursor:pointer;
  color:var(--text);
  transition:.13s;
  border:1px solid transparent;
}
.day.empty{cursor:default;}
.day:not(.empty):hover{background:var(--blue-bg);}
.day.sun{color:#C49494;}
.day.sat{color:#8197BD;}
.day.today{
  border-color:var(--blue-main);
  font-weight:400;
}
.day.selected{
  background:var(--blue-main);
  color:#fff;
}
.day.selected.sun,.day.selected.sat{color:#fff;}
.day .dot{
  position:absolute;
  bottom:4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--blue-main);
}
.day.selected .dot{background:#fff;}

.legend{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid var(--line-soft);
  display:flex;
  flex-direction:column;
  gap:7px;
  font-size:11px;
  color:var(--text-sub);
}
.legend .row{display:flex;align-items:center;gap:8px;}
.legend .chip{width:16px;height:16px;border-radius:5px;flex:0 0 auto;}
.legend .chip.today{border:1px solid var(--blue-main);}
.legend .chip.sel{background:var(--blue-main);}
.legend .chip.evt{display:flex;align-items:center;justify-content:center;}
.legend .chip.evt::after{content:"";width:4px;height:4px;border-radius:50%;background:var(--blue-main);}

/* ---------- STAGE : 플래너 종이 ---------- */
.stage{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px 26px 60px;
  overflow:auto;
}
.paper{
  width:100%;
  max-width:560px;
  background:var(--paper);
  border-radius:6px;
  box-shadow:0 10px 30px -18px rgba(38,55,70,.35), 0 1px 0 rgba(0,0,0,.02);
  overflow:hidden;
  border:1px solid var(--line-soft);
}
.bar{
  background:var(--blue-main);
  height:22px;
}
.bar.bottom{
  display:flex;align-items:center;justify-content:center;
  height:26px;
}
.bar.bottom span{
  font-family:var(--font-label);
  font-size:9px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:rgba(255,255,255,.8);
}

.sheet{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:30px;
  padding:30px 30px 26px;
}
.col{display:flex;flex-direction:column;min-width:0;}

/* ---------- 공통 필드 ---------- */
.field{margin-bottom:22px;}
.field > h3{
  font-family:var(--font-label);
  font-weight:400;
  letter-spacing:.18em;
  font-size:13px;
  color:var(--text);
  text-transform:uppercase;
  margin-bottom:6px;
}
.field .val{
  min-height:30px;
  border-bottom:1px solid var(--line);
  padding-bottom:8px;
  font-size:14px;
}

/* DATE */
.field.date .val{font-size:16px;letter-spacing:.02em;}

/* D-DAY */
.field.dday .dday-main{
  display:flex;align-items:baseline;gap:8px;
}
.field.dday .dday-tag{
  font-family:var(--font-label);
  font-size:20px;
  font-weight:500;
  color:var(--blue-deep);
  letter-spacing:.04em;
}
.field.dday .dday-title{font-size:13px;color:var(--text);}
.dd-dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;display:inline-block;align-self:center;}
.field.dday .dday-list li .dd-dot{margin-right:2px;}
.field.dday .dday-list{
  list-style:none;margin-top:8px;
  border-top:1px solid var(--line-soft);padding-top:8px;
  max-height:108px;overflow-y:auto;            /* 길어도 영역 고정 → 페이지 유지 */
  overscroll-behavior:contain;
}
.field.dday .dday-list::-webkit-scrollbar{width:4px;}
.field.dday .dday-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.field.dday .dday-list li{
  display:flex;align-items:center;gap:8px;
  font-size:12px;padding:3px 0;color:var(--text-sub);
}
.field.dday .dday-list .dl-tag{
  font-family:var(--font-label);
  font-weight:500;color:var(--blue-main);
  font-size:12px;min-width:38px;
}
.field.dday .val.empty-line{border-bottom:1px solid var(--line);min-height:34px;}

/* CONTENTS / TOTAL */
.field.contents .val,.field.total .val{
  color:var(--text-sub);font-size:13px;line-height:1.6;
}
.field.contents .val b,.field.total .val b{color:var(--text);font-weight:400;}

/* TASK */
.field.task > h3,.field.memo > h3,.field.timetable > h3{
  border-bottom:1.5px solid var(--blue-main);
  padding-bottom:6px;
}
.task-body{
  position:relative;
  margin-top:2px;
}
.task-line{
  position:relative;
  height:34px;
  display:flex;align-items:center;
  border-bottom:1px solid var(--line);
  padding:0 2px;
  z-index:2;
}
/* 원본 양식의 옅은 세로 구분선(장식) */
.task-body::after{
  content:"";
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft));
  background-size:1px 100%,1px 100%,1px 100%;
  background-position:58% 0,72% 0,86% 0;
  background-repeat:no-repeat;
  opacity:.7;
  pointer-events:none;
  z-index:1;
}
.task-line .badge{flex:0 0 auto;}
.task-line .t-title{
  font-size:13px;color:var(--text);
  flex:1 1 auto;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-line .t-time{
  margin-left:auto;
  font-family:var(--font-label);
  font-size:11px;color:var(--text-sub);
  letter-spacing:.04em;
  padding-left:8px;
  background:rgba(255,255,255,.85);
}
/* 항목 삭제 버튼 — 기본 숨김(데스크톱은 길게 누르기), 세로 모드에서 노출 */
.task-line .del-x{
  display:none;
  flex:0 0 auto;
  width:26px;height:26px;
  margin-left:6px;
  align-items:center;justify-content:center;
  color:#B6C5D0;font-size:18px;line-height:1;
  border-radius:7px;cursor:pointer;
  z-index:3;
}
.task-line .del-x:active{background:rgba(193,138,138,.15);color:#C18A8A;}

/* 일정 유형 뱃지 (푸른 계열) */
.badge{
  display:inline-block;
  font-size:11px;
  padding:1px 8px;
  border-radius:20px;
  margin-right:8px;
  letter-spacing:.02em;
  white-space:nowrap;
}
.badge.exam{background:rgba(63,107,142,.14);color:var(--blue-deep);}
.badge.assignment{background:rgba(94,135,168,.16);color:#4A7A9E;}
.badge.present{background:rgba(78,134,160,.16);color:#39708A;}
.badge.etc{background:rgba(157,180,196,.20);color:#647C8C;}
.badge.custom{background:rgba(92,147,166,.16);color:#3F7E8E;}
.badge.todo{background:rgba(122,141,155,.16);color:#7A8D9B;}

/* TASK 헤더의 작은 + 버튼 */
.field.task > h3{display:flex;align-items:center;justify-content:space-between;}
.add-btn{
  font-family:var(--font-ko);
  border:1px solid var(--line);
  background:#fff;color:var(--blue-main);
  font-size:11px;letter-spacing:0;
  padding:2px 9px;border-radius:20px;cursor:pointer;
  transition:.15s;
}
.add-btn:hover{background:var(--blue-bg);border-color:var(--blue-main);}
.task-add-group{display:flex;gap:6px;align-items:center;}
.add-btn.ghost{color:var(--text-sub);}
.add-btn.ghost:hover{color:var(--blue-main);}
.tag-dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;margin-right:2px;}
.total-study{margin-top:6px;font-size:13px;color:var(--text);}
.study-pct{color:var(--text-sub);font-size:12px;}
.study-bar{margin-top:6px;height:8px;border-radius:5px;background:rgba(157,180,196,.22);overflow:hidden;}
.study-bar-fill{height:100%;border-radius:5px;background:var(--blue-main);transition:width .4s ease;}
.tag-manage-btn{
  font-family:var(--font-ko);font-size:11px;color:var(--blue-main);
  border:1px solid var(--line);background:#fff;border-radius:12px;padding:1px 9px;cursor:pointer;margin-left:6px;
}
.tag-manage{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.tag-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-ko);font-size:12px;color:var(--text);
  background:var(--blue-bg);border:1px solid var(--line);border-radius:14px;padding:3px 9px;
}
.tag-chip i{width:9px;height:9px;border-radius:50%;display:inline-block;}
.tag-chip b{cursor:pointer;color:var(--text-sub);font-weight:400;font-size:14px;line-height:1;margin-left:2px;}
.tag-chip b:hover{color:#C0392B;}
.total-bytag{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 12px;}
.ts-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-sub);}
.ts-tag i{width:8px;height:8px;border-radius:2px;display:inline-block;}

/* 체크박스 */
.chk{
  flex:0 0 auto;
  width:15px;height:15px;
  border:1.5px solid var(--blue-main);
  border-radius:4px;
  margin-right:9px;
  cursor:pointer;
  position:relative;
  background:#fff;
  transition:.13s;
}
.chk:hover{background:var(--blue-bg);}
.chk.checked{background:var(--blue-main);border-color:var(--blue-main);}
.chk.checked::after{
  content:"";
  position:absolute;left:4px;top:1px;
  width:4px;height:8px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(43deg);
}
.task-line.done .t-title{color:var(--text-sub);text-decoration:line-through;}
.task-line.done .badge{opacity:.55;}
.task-line.done .t-time{color:#B6C5D0;}

/* 빠른 할일 입력 줄 */
.task-line.input-line{padding:0;}
.task-line .quick-mark{
  flex:0 0 auto;width:15px;height:15px;margin-right:9px;
  display:flex;align-items:center;justify-content:center;
  color:var(--blue-main);font-size:15px;line-height:1;
}
.quick-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:var(--font-ko);font-size:13px;color:var(--text);
  height:100%;min-width:0;width:100%;
}
.quick-input::placeholder{color:#B6C5D0;}

/* MEMO (읽기 영역 + 버튼 → 모달 입력) */
.memo-view{
  width:100%;
  min-height:140px;
  margin-top:4px;
  padding:0 2px;
  background:repeating-linear-gradient(
    transparent,transparent 27px,var(--line) 27px,var(--line) 28px);
  line-height:28px;
  font-family:var(--font-ko);
  font-size:13px;color:var(--text);
  white-space:pre-wrap;word-break:break-word;
  cursor:text;
}
.memo-view:empty::before{
  content:attr(data-empty);
  color:#B6C5D0;
}
.field.memo > h3{display:flex;align-items:center;justify-content:space-between;}
.memo-edit{
  font-family:var(--font-ko);
  border:1px solid var(--line);background:#fff;color:var(--blue-main);
  width:24px;height:24px;border-radius:7px;cursor:pointer;font-size:15px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.memo-edit:active{background:var(--blue-bg);}

/* ---------- TIME TABLE ---------- */
.tt{margin-top:2px;}
.tt-grid{
  position:relative;
  border-top:1px solid var(--line-soft);
}
.tt-row{
  display:flex;
  align-items:stretch;
  height:var(--tt-row);
}
.tt-row .tt-h{
  flex:0 0 26px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:8px;
  font-family:var(--font-label);
  font-size:11px;color:var(--text-sub);
  border-bottom:1px solid var(--line-soft);
}
.tt-row .tt-cells{
  flex:1;
  border-left:1px solid var(--line);
  border-bottom:1px solid var(--line-soft);
  background-image:
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft)),
    linear-gradient(var(--line-soft),var(--line-soft));
  background-size:1px 100%,1px 100%,1px 100%;
  background-position:25% 0,50% 0,75% 0;
  background-repeat:no-repeat;
}
/* 이벤트 블록 오버레이 영역 (라벨 26px 이후부터) */
.tt-blocks{
  position:absolute;
  top:0;left:26px;right:0;bottom:0;
  pointer-events:none;
}
.tt-block{
  position:absolute;
  left:3px;right:3px;
  border-radius:5px;
  padding:2px 6px;
  overflow:hidden;
  font-size:10.5px;
  line-height:1.25;
  color:#fff;
  box-shadow:0 1px 2px rgba(38,55,70,.12);
}
.tt-block .b-title{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;
}
.tt-block .b-time{
  font-family:var(--font-label);
  font-size:9px;opacity:.85;letter-spacing:.03em;
}
.tt-block.exam{background:var(--blue-deep);}
.tt-block.assignment{background:var(--blue-main);}
.tt-block.present{background:#4E86A0;}
.tt-block.todo{background:#9DB4C4;}
.tt-block.etc{background:#8AA6BC;}
.tt-block.custom{background:#5C93A6;}
.tt-block.done{opacity:.4;}
.tt-block.done .b-title{text-decoration:line-through;}
/* 유형 변경 가능한 뱃지 */
.badge.editable{cursor:pointer;}
.badge.editable::after{content:" ⌄";opacity:.5;font-size:9px;}
.type-opts{display:flex;flex-wrap:wrap;gap:8px;}
.type-opt{
  flex:1 1 40%;
  font-family:var(--font-ko);font-size:14px;
  padding:11px 0;border-radius:10px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--text);
}
.type-opt:hover{background:var(--blue-bg);border-color:var(--blue-main);}
.type-opt.cur{background:var(--blue-main);color:#fff;border-color:var(--blue-main);}

/* ============================================================
   세로 모드 전용 추가 버튼 (FAB) + 길게 누르기 표시 — 기본값
   ============================================================ */
.fab-bar{ display:none; }
.cal-memo{ display:none; }   /* 세로(폰) 모드에서만 표시 */
.fab-bar button{
  flex:1;
  font-family:var(--font-ko);
  font-size:14px;
  padding:13px 0;
  border-radius:12px;
  border:none;cursor:pointer;
  box-shadow:0 6px 18px -8px rgba(38,55,70,.5);
}
.fab-bar .fab-todo{background:#fff;color:var(--blue-deep);border:1px solid var(--blue-main);}
.fab-bar .fab-event{background:var(--blue-main);color:#fff;}
.task-line.pressing{background:var(--blue-bg);}
.del-hint{
  font-size:10.5px;color:#B6C5D0;margin-top:6px;text-align:center;letter-spacing:.02em;
}

/* 일정/할일 분리 — 기본(가로)은 좌우 2단 */
.task-tabs{display:none;}
.task-cols{display:flex;gap:16px;}
.task-col{flex:1 1 0;min-width:0;display:flex;flex-direction:column;}
.task-col-label{
  font-family:var(--font-label);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-sub);margin:0 0 4px;
}
.task-tab{
  flex:1;font-family:var(--font-ko);font-size:13px;
  padding:7px 0;border:1px solid var(--line);background:#fff;color:var(--text-sub);
  border-radius:9px;cursor:pointer;
}
.task-tab.active{background:var(--blue-main);color:#fff;border-color:var(--blue-main);}

/* ============================================================
   LANDSCAPE 넓은 화면 (≥981px) — 대칭 구조
   왼쪽=포스트잇 / 가운데=플래너 종이 / 오른쪽=공부시간 통계
   ============================================================ */
.side-zone{display:none;}        /* 가로(≥981px)에서만 표시 */
@media (min-width:981px){
  .stage{
    align-items:flex-start;
    justify-content:center;        /* 가운데 대칭 */
    gap:22px;
    padding:30px 24px 60px;
  }
  .paper{
    flex:0 0 auto;
    width:540px;
    max-width:540px;
  }
  .sheet{column-gap:24px;padding:28px 26px 22px;}
  .task-cols{gap:12px;}
  /* 양옆 대칭 영역 */
  .side-zone{
    display:flex;
    flex:1 1 0;
    min-width:0;
    max-width:360px;
    align-self:stretch;
    flex-direction:column;
  }
  #postitArea{
    flex:1 1 auto; min-height:300px;
    position:relative;
    border:1px solid var(--line);
    border-radius:12px;
    background:rgba(255,255,255,.45);
    overflow:hidden;
  }
  #statsArea{
    flex:1 1 auto; min-height:300px;
    border:1px solid var(--line);
    border-radius:12px;
    background:rgba(255,255,255,.5);
    display:flex; flex-direction:column; overflow:hidden;
  }
}
/* 포스트잇 카드 */
.pa-head{
  position:absolute; top:0; left:0; right:0; height:38px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px; z-index:3; pointer-events:none;
  font-family:var(--font-label); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-sub);
}
.pa-head .add-btn{pointer-events:auto;}
.postit{
  position:absolute; width:168px; min-height:124px;
  border-radius:4px; padding:6px 9px 9px;
  box-shadow:0 7px 18px -9px rgba(38,55,70,.55);
  display:flex; flex-direction:column; gap:5px; z-index:1;
}
.postit .grip{
  height:20px; margin:-2px -4px 3px; border-radius:4px 4px 0 0;
  display:flex; align-items:center; justify-content:center;
  cursor:grab; touch-action:none; user-select:none;
  color:rgba(0,0,0,.3); font-size:13px; letter-spacing:2px;
  background:rgba(0,0,0,.06);
}
.postit .grip:active{cursor:grabbing;background:rgba(0,0,0,.1);}
.postit .pin{height:18px; display:flex; gap:6px; align-items:center;}
.postit .pin .colors{display:flex; gap:6px;}
.postit .pin .cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.12);}
.postit .pin .cdot:active{transform:scale(.88);}
.postit .pin .del{margin-left:auto;cursor:pointer;color:rgba(0,0,0,.42);font-size:18px;line-height:1;padding:0 2px;}
.postit textarea{
  flex:1; border:none; background:transparent; resize:none; outline:none;
  font-family:var(--font-ko); font-size:12.5px; color:#3a382f; line-height:1.45;
}
/* 공부시간 통계 */
.st-head{
  display:flex; align-items:center; justify-content:space-between; flex:0 0 auto;
  padding:10px 14px; border-bottom:1px solid var(--line);
}
.st-title{font-family:var(--font-label); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-sub);}
.st-period{display:block;margin-top:3px;font-family:var(--font-ko);font-style:normal;font-size:13px;letter-spacing:0;text-transform:none;color:var(--blue-deep);}
.st-toggle{display:flex; gap:4px;}
.st-toggle button{
  font-family:var(--font-ko); font-size:12px; padding:4px 12px; border-radius:8px; cursor:pointer;
  border:1px solid var(--line); background:#fff; color:var(--text-sub);
}
.st-toggle button.active{background:var(--blue-main); color:#fff; border-color:var(--blue-main);}
.st-body{flex:1 1 auto; overflow-y:auto; padding:14px 16px;}
.st-total{font-family:var(--font-ko); font-size:14px; color:var(--text); margin-bottom:14px;}
.st-total b{font-size:17px; color:var(--blue-deep);}
.st-bar-row{margin-bottom:12px;}
.st-bar-top{display:flex; justify-content:space-between; font-size:12px; color:var(--text-sub); margin-bottom:4px;}
.st-bar-track{height:12px; border-radius:6px; background:rgba(157,180,196,.18); overflow:hidden;}
.st-bar-fill{height:100%; border-radius:6px; transition:width .4s ease;}
.st-empty{color:var(--text-sub); font-size:12.5px; text-align:center; margin-top:30px; line-height:1.6;}

/* ============================================================
   STACKED  (태블릿 세로·분할뷰 등 980px 이하) — 위아래 배치 + FAB
   ============================================================ */
@media (max-width:980px){
  .app{flex-direction:column;}
  .sidebar{
    width:100%;flex:none;
    border-right:none;border-bottom:1px solid var(--line);
    padding:18px 16px;
  }
  .brand{margin-bottom:16px;}
  .calendar{max-width:420px;margin:0 auto;}
  .stage{
    padding:18px 14px 96px;       /* 하단 FAB 공간 */
    overflow-y:auto;
  }

  /* 인라인 추가 UI는 숨기고 FAB로 분리 동작 */
  .field.task > h3 .add-btn{display:none;}
  .task-line.input-line{display:none;}

  .fab-bar{
    display:flex;
    gap:10px;
    position:fixed;
    left:0;right:0;bottom:0;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(227,236,242,.96) 70%, rgba(227,236,242,0));
    z-index:80;
  }
}

/* ============================================================
   PHONE 세로 전용 (≤600px)
   스크롤 없이 한 화면 · 폰트 축소 · 할일/일정확인/일정추가에 포커스
   ============================================================ */
@media (max-width:600px){
  html,body{height:100%;overflow:hidden;}     /* 페이지 스크롤 제거 */
  .app{height:100vh;}

  /* 캘린더(날짜 선택)는 더 컴팩트하게 — TASK 공간 확보 */
  .sidebar{
    flex:0 0 auto;padding:8px 14px 6px;
    display:flex;flex-wrap:wrap;align-items:stretch;column-gap:10px;row-gap:0;
  }
  .brand{flex:0 0 100%;margin-bottom:6px;}
  .brand .mark{font-size:10px;letter-spacing:.24em;}
  .brand h1{font-size:14px;margin-top:2px;}
  .brand p{display:none;}
  .gcal-box{margin-top:7px;}
  .gcal-btn{padding:7px 10px;font-size:12px;border-radius:9px;}
  .gcal-refresh{width:34px;font-size:15px;border-radius:9px;}
  .gcal-status{font-size:10px;margin-top:3px;min-height:0;}

  /* 상단을 좌(캘린더) · 우(메모) 2단으로 */
  .calendar{
    flex:1 1 0;min-width:0;
    max-width:none;padding:7px 8px 5px;border-radius:11px;margin-top:0;
  }
  .cal-memo{
    display:flex;flex-direction:column;
    flex:1 1 0;min-width:0;
    background:#fff;border:1px solid var(--line);border-radius:11px;
    padding:7px 9px;
  }
  .cm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .cm-label{
    font-family:var(--font-label);font-size:10px;letter-spacing:.16em;color:var(--text);
  }
  .cal-memo .memo-edit{width:22px;height:22px;font-size:14px;}
  .cal-memo .memo-view{
    flex:1;min-height:0;margin-top:0;
    background:repeating-linear-gradient(transparent,transparent 23px,var(--line) 23px,var(--line) 24px);
    line-height:24px;font-size:13px;
    overflow-y:auto;
  }
  .cal-head{margin-bottom:5px;}
  .cal-title{font-size:11px;}
  .cal-nav{width:20px;height:20px;font-size:12px;}
  .cal-grid.weekdays span{padding:1px 0;font-size:9px;}
  .cal-grid{gap:1px;}
  .day{aspect-ratio:auto;height:22px;font-size:10px;border-radius:5px;}
  .day .dot{bottom:2px;width:3px;height:3px;}
  .legend{display:none;}                        /* 공간 절약 */

  /* 종이를 화면 높이에 맞춰 채우고 내부만 정리 */
  .stage{flex:1 1 auto;min-height:0;padding:8px 12px 82px;overflow:hidden;}
  .paper{
    width:100%;max-width:none;height:100%;
    display:flex;flex-direction:column;
  }
  .bar{height:14px;}
  .bar.bottom{display:none;}                     /* 하단 장식 바 숨김 */

  /* DATE · D-DAY · CONTENTS · TOTAL 을 상단 2×2, TASK 는 전체폭 */
  .sheet{
    flex:1;min-height:0;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto 1fr;
    column-gap:14px;row-gap:0;
    padding:10px 16px 10px;
  }
  .col{display:contents;}                         /* 필드를 그리드로 직접 배치 */
  .field{margin-bottom:0;}
  .field > h3{font-size:9.5px;letter-spacing:.12em;margin-bottom:2px;}
  .field .val{min-height:0;padding-bottom:4px;font-size:12px;}
  /* CONTENTS·TOTAL 한 줄 유지 */
  .field.contents .val,.field.total .val{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .field.date   {grid-column:1;grid-row:1;}
  .field.dday   {grid-column:2;grid-row:1;}
  .field.contents{grid-column:1;grid-row:2;}
  .field.total  {grid-column:2;grid-row:2;}
  .field.task   {grid-column:1 / -1;grid-row:3;display:flex;flex-direction:column;min-height:0;margin-top:3px;}

  /* 포커스 외 영역 숨김 */
  .field.memo, .field.timetable{display:none;}

  /* DATE 작게 */
  .field.date .val{font-size:13px;}

  /* D-DAY 한 줄 · 폰트 축소 (두 줄 겹침 해결) */
  .field.dday .dday-main{white-space:nowrap;overflow:hidden;align-items:baseline;}
  .field.dday .dday-tag{font-size:14px;}
  .field.dday .dday-title{font-size:11px;overflow:hidden;text-overflow:ellipsis;}
  .field.dday .dday-list{display:none;}           /* 헤드라인만 표시 */
  .field.dday .val.empty-line{min-height:22px;}

  /* TASK = 메인 영역, 할일이 많으면 이 목록 안에서만 세로 스크롤 */
  .field.task > h3{border-bottom-width:1.5px;flex:0 0 auto;}
  .task-tabs{display:flex;gap:6px;margin:4px 0 6px;flex:0 0 auto;}
  .task-cols{flex:1 1 auto;min-height:0;display:block;gap:0;}
  .task-col{display:none;height:100%;}
  .task-col.active{display:flex;}
  .task-col-label{display:none;}              /* 탭이 대신함 */
  .task-line{-webkit-touch-callout:none;user-select:none;}
  .task-line .del-x{display:flex;}            /* 세로 모드: 삭제 버튼 노출 */
  .task-body{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }
  .task-body::-webkit-scrollbar{width:5px;}
  .task-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .del-hint{display:none;}
}

/* ============================================================
   일정 추가 모달
   ============================================================ */
.modal-back{
  position:fixed;inset:0;
  background:rgba(38,55,70,.32);
  backdrop-filter:blur(2px);
  display:none;
  align-items:center;justify-content:center;
  padding:20px;z-index:100;
}
.modal-back.open{display:flex;}
.modal{
  width:100%;max-width:360px;
  background:#fff;border-radius:14px;
  border:1px solid var(--line);
  box-shadow:0 18px 50px -20px rgba(38,55,70,.5);
  overflow:hidden;
}
.modal .m-head{
  background:var(--blue-main);color:#fff;
  padding:14px 18px;
  font-family:var(--font-label);letter-spacing:.16em;
  text-transform:uppercase;font-size:13px;
}
.modal .m-body{padding:16px 18px 6px;}
.m-field{margin-bottom:13px;}
.m-field label{
  display:block;font-size:11px;color:var(--text-sub);
  letter-spacing:.04em;margin-bottom:4px;
}
.m-field input,.m-field select,.m-field textarea{
  width:100%;
  border:1px solid var(--line);border-radius:8px;
  padding:8px 10px;font-family:var(--font-ko);font-size:13px;
  color:var(--text);background:#fff;outline:none;
}
.m-field textarea{resize:vertical;line-height:1.5;}
.m-field input:focus,.m-field select:focus,.m-field textarea:focus{border-color:var(--blue-main);}
.m-row{display:flex;gap:10px;}
.m-row .m-field{flex:1;}
.m-actions{
  display:flex;gap:8px;justify-content:flex-end;
  padding:10px 18px 18px;
}
.m-actions button{
  font-family:var(--font-ko);font-size:13px;
  padding:8px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--line);
}
.m-actions .btn-cancel{background:#fff;color:var(--text-sub);}
.m-actions .btn-cancel:hover{background:var(--blue-bg);}
.m-actions .btn-save{background:var(--blue-main);color:#fff;border-color:var(--blue-main);}
.m-actions .btn-save:hover{background:var(--blue-deep);}
#mCustomWrap{display:none;}
/* ============================================================
   구글 연동 버튼 / 동기화 상태
   ============================================================ */
.gcal-box{margin-top:12px;}
.gcal-row{display:flex;gap:6px;align-items:stretch;}
.gcal-btn{
  flex:1;
  font-family:var(--font-ko);font-size:13px;
  padding:9px 12px;border-radius:10px;cursor:pointer;
  border:1px solid var(--blue-main);background:#fff;color:var(--blue-deep);
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:.15s;
}
.gcal-btn:hover{background:var(--blue-bg);}
.gcal-btn.connected{background:var(--blue-main);color:#fff;border-color:var(--blue-main);}
.gcal-refresh{
  flex:0 0 auto;width:40px;
  border:1px solid var(--line);background:#fff;color:var(--blue-main);
  border-radius:10px;cursor:pointer;font-size:17px;line-height:1;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.gcal-refresh:hover{background:var(--blue-bg);border-color:var(--blue-main);}
.gcal-refresh.spin{animation:gcalspin .8s linear infinite;}
@keyframes gcalspin{to{transform:rotate(360deg);}}
.gcal-status{
  margin-top:6px;font-size:11px;color:var(--text-sub);text-align:center;min-height:14px;
}
.gcal-status.err{color:#C18A8A;}
</style>

<body>
<div class="app">
  <!-- ===================== 날짜 선택 (월간 캘린더) ===================== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">Study Planner</div>
      <h1>개인 일정 비서</h1>
      <p>날짜를 선택해 그날의 플래너를 확인하세요</p>
      <div class="gcal-box">
        <div class="gcal-row">
          <button class="gcal-btn" id="gcalBtn">구글 캘린더 연결</button>
          <button class="gcal-refresh" id="gcalRefresh" title="동기화 새로고침" aria-label="동기화 새로고침">↻</button>
        </div>
        <div class="gcal-status" id="gcalStatus"></div>
      </div>
    </div>

    <div class="calendar">
      <div class="cal-head">
        <button class="cal-nav" id="prevMonth" aria-label="이전 달">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" id="nextMonth" aria-label="다음 달">›</button>
      </div>
      <div class="cal-grid weekdays">
        <span class="sun">일</span><span>월</span><span>화</span>
        <span>수</span><span>목</span><span>금</span><span class="sat">토</span>
      </div>
      <div class="cal-grid days" id="calDays"></div>

      <div class="legend">
        <div class="row"><span class="chip today"></span>오늘</div>
        <div class="row"><span class="chip sel"></span>선택한 날짜</div>
        <div class="row"><span class="chip evt"></span>일정 있는 날</div>
      </div>
    </div>

    <div class="cal-memo">
      <div class="cm-head">
        <span class="cm-label">MEMO</span>
        <button class="memo-edit" id="memoBtnMobile" aria-label="메모 입력">＋</button>
      </div>
      <div class="memo-view" id="fMemoMobile" data-empty="메모 추가"></div>
    </div>
  </aside>

  <!-- ===================== 플래너 종이 ===================== -->
  <main class="stage">
    <div class="side-zone left" id="zoneLeft"><div id="postitArea"></div></div>
    <div class="paper">
      <div class="bar top"></div>

      <div class="sheet">
        <!-- 왼쪽 -->
        <div class="col left">
          <section class="field date">
            <h3>Date</h3>
            <div class="val" id="fDate"></div>
          </section>

          <section class="field contents">
            <h3>Contents</h3>
            <div class="val" id="fContents"></div>
          </section>

          <section class="field task">
            <h3>Task<button class="add-btn" id="openAddTodoLs">+ 할일</button></h3>
            <div class="task-body" id="fTaskTodo"></div>
          </section>

          <section class="field memo">
            <h3>Memo<button class="add-btn" id="memoBtn">＋ 메모 입력</button></h3>
            <div class="memo-view" id="fMemo" data-empty="메모 추가"></div>
          </section>
        </div>

        <!-- 오른쪽 -->
        <div class="col right">
          <section class="field dday">
            <h3>D-Day</h3>
            <div class="val" id="fDday"></div>
          </section>

          <section class="field total">
            <h3>Total</h3>
            <div class="val" id="fTotal"></div>

          <section class="field timetable">
            <h3>Time Table</h3>
            <div class="tt" id="fTime"></div>

      <div class="bar bottom"><span>personal schedule</span></div>

    <div class="side-zone right" id="zoneRight">
      <div id="statsArea"></div>

</div>

    <div class="m-body">

/* ============================================================================

const EventsStore = {
  events: [],
  googleEvents: [],
  googleTasks: [],
  doneMap: {},
  load(){
    const deleted = new Set(Storage.getDeleted());
    const user = Storage.getUserEvents();          // 사용자가 추가한 일정/할일
    this.events = SAMPLE_EVENTS.filter(e => !deleted.has(e.id)).concat(user);
    this.doneMap = Storage.getDoneMap();            // 완료 체크 상태
    this.events.forEach(e => { e.done = !!this.doneMap[e.id]; });
  },
  setGoogleEvents(arr){
    this.googleEvents = arr || [];
    // 구글 일정: ✓ 표시(normalize의 done)가 기준, 로컬 doneMap은 보조
    this.googleEvents.forEach(e => { e.done = e.done || !!this.doneMap[e.id]; });
  },
  setGoogleTasks(arr){
    this.googleTasks = arr || [];   // 완료 상태는 구글 Tasks가 기준(그대로 사용)
    this.reattachTodoMeta();
  },
  reattachTodoMeta(){
    const attach = (t)=>{
      const m = todoMeta[t.id];
      t.startTime = m && m.start ? m.start : undefined;
      t.endTime   = m && m.end   ? m.end   : undefined;
      t.tag       = m && m.tag   ? m.tag   : undefined;
    };
    this.googleTasks.forEach(attach);
    this.events.filter(e => e.type === 'todo').forEach(attach);
  },
  _all(){ return this.events.concat(this.googleEvents).concat(this.googleTasks); },
  persistUser(){
    // 샘플을 제외한 사용자 생성분만 저장
    Storage.setUserEvents(this.events.filter(e => String(e.id).startsWith("u-")));
  },
  getAll(){ return this._all(); },
  getByDate(date){ return this._all().filter(e => e.date === date); },
  addEvent(evt){
    evt.id = "u-" + Date.now() + "-" + Math.floor(Math.random()*1000);
    evt.done = false;
    this.events.push(evt);
    this.persistUser();
    return evt;
  },
  addTodo(date, title){
    return this.addEvent({ title, type:"todo", date, source:"local" });
  },
  removeEvent(id){
    this.events = this.events.filter(e => e.id !== id);
    this.googleEvents = this.googleEvents.filter(e => e.id !== id);
    if(this.doneMap[id]){ delete this.doneMap[id]; Storage.setDoneMap(this.doneMap); }
    if(!String(id).startsWith("u-")){            // 샘플/구글 삭제도 화면상 유지되도록 기록
      const del = Storage.getDeleted();
      if(!del.includes(id)){ del.push(id); Storage.setDeleted(del); }
    }
    this.persistUser();
  },
  toggleDone(id){
    const e = this._all().find(x => x.id === id);

  getUpcoming(fromDate, types){
    return this._all()
      .filter(e => e.date >= fromDate)
      .filter(e => !types || types.includes(e.type))
      .sort((a,b)=> a.date === b.date

  }
};

function fmt(d){

  return `${y}-${m}-${day}`;
}
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }

/* ============================================================================

const GOOGLE_CLIENT_ID = '963829025495-2usp15tnpri905boo5rbjmo69eikv90f.apps.googleusercontent.com';
const GOOGLE_SCOPE = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks https://www.googleapis.com/auth/drive.appdata';  // 캘린더 + 할일 + 메모(앱 전용 숨김폴더)

/* 토큰 저장/복원 (앱 껐다 켜도 유지) */
const TOKEN_KEY = 'planner:gcalToken';
const CONN_KEY  = 'planner:gcalConnected';
function saveToken(token, expiresInSec){
  tokenExpiry = Date.now() + ((expiresInSec || 3600) * 1000);
  try{
    localStorage.setItem(TOKEN_KEY, JSON.stringify({ token, exp: tokenExpiry, scope: GOOGLE_SCOPE }));
    localStorage.setItem(CONN_KEY, '1');
  }catch(e){}
}
function loadToken(){
  try{
    const raw = localStorage.getItem(TOKEN_KEY);
    if(!raw) return false;
    const o = JSON.parse(raw);
    if(o && o.scope !== GOOGLE_SCOPE) return false;   // 권한 범위 바뀌면 재인증 필요
    if(o && o.token && o.exp && o.exp > Date.now() + 30000){  // 30초 여유
      accessToken = o.token; tokenExpiry = o.exp; return true;
    }
  }catch(e){}
  return false;
}
function clearToken(){
  try{ localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(CONN_KEY); }catch(e){}
}

const TYPE_TAGS = { exam:'[시험]', assignment:'[과제]', present:'[발표]', etc:'[기타]' };
/* 제목 앞 유형 태그 제거(표시·재태깅용) */
function stripTypeTag(s){
  return (s || '').replace(/^\s*\[\s*(시험|과제|발표|기타)\s*\]\s*/, '').trim();
}
/* 유형 자동 분류: 대괄호 태그 우선 → 키워드 추론 → 기타 */
function classifyType(title, desc){
  const raw = ((title||'') + ' ' + (desc||''));
  const t = raw.toLowerCase();
  const has = (arr)=>arr.some(k => t.includes(k));
  if(/\[\s*시험\s*\]/.test(raw)) return 'exam';
  if(/\[\s*과제\s*\]/.test(raw)) return 'assignment';
  if(/\[\s*발표\s*\]/.test(raw)) return 'present';
  if(/\[\s*기타\s*\]/.test(raw)) return 'etc';
  if(has(['시험','고사','중간','기말','exam','test','quiz','퀴즈'])) return 'exam';
  if(has(['과제','숙제','제출','레포트','리포트','assignment','homework','hw','due'])) return 'assignment';
  // 발표 관련 키워드(PT 제외)
  if(has(['발표회','구두발표','조별발표','팀발표','발표','프레젠테이션','presentation','세미나','브리핑'])) return 'present';
  return 'etc';
}

function normalizeGoogleCalendarEvent(raw){
  // Google Calendar 이벤트 -> 내부 스키마로 변환
  const start = raw?.start?.dateTime || raw?.start?.date || "";
  const end   = raw?.end?.dateTime   || raw?.end?.date   || "";
  const timed = start.length > 10;
  const rawSummary = raw.summary || '';
  const doneMark = /^\s*✓\s*/.test(rawSummary);            // 완료 표시(✓) 인식
  const clean = rawSummary.replace(/^\s*✓\s*/, '');        // ✓ 제거
  return {
    id: raw.id,
    title: stripTypeTag(clean) || "(제목 없음)",            // 표시용 제목(✓·태그 제거)
    type: typeOverrides[raw.id] || classifyType(clean, raw.description),  // 사용자 지정 우선
    date: (start || "").slice(0,10),
    startTime: timed ? start.slice(11,16) : undefined,
    endTime:   end.length>10 ? end.slice(11,16) : undefined,
    memo: raw.description || "",
    done: doneMark,                                         // ✓ 기준(두 기기 공유)
    source: "google-calendar"
  };
}

async function fetchGoogleCalendarEvents(timeMin, timeMax){
  if(!accessToken) return [];
  const params = new URLSearchParams({
    timeMin, timeMax,
    singleEvents: 'true',
    orderBy: 'startTime',
    maxResults: '250'
  });
  const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?' + params.toString();
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if(!res.ok){
    if(res.status === 401){ accessToken = null; tokenExpiry = 0; updateAuthUI(); }
    throw new Error('Calendar fetch failed: ' + res.status);
  }
  const data = await res.json();
  return (data.items || []).map(normalizeGoogleCalendarEvent).filter(e => e.date);
}

/* 다음날(YYYY-MM-DD) — 종일 일정 end.date(배타적)용 */
function nextDayStr(dateStr){
  const d = parseDate(dateStr); d.setDate(d.getDate()+1); return fmt(d);
}
/* 내부 일정 → 구글 이벤트 본문. 유형은 제목 태그로 보존 */
function toGoogleBody(evt){
  const tag = TYPE_TAGS[evt.type] ? TYPE_TAGS[evt.type] + ' ' : '';
  const body = {
    summary: tag + stripTypeTag(evt.title || ''),
    description: evt.memo || ''
  };
  if(evt.startTime && evt.endTime){
    body.start = { dateTime: `${evt.date}T${evt.startTime}:00`, timeZone: 'Asia/Seoul' };
    body.end   = { dateTime: `${evt.date}T${evt.endTime}:00`,   timeZone: 'Asia/Seoul' };
  } else {
    body.start = { date: evt.date };
    body.end   = { date: nextDayStr(evt.date) };
  }
  return body;
}
async function gcalInsertEvent(evt){
  const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events';
  const res = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify(toGoogleBody(evt))
  });
  if(!res.ok){
    if(res.status === 401){ accessToken = null; tokenExpiry = 0; updateAuthUI(); }
    throw new Error('Calendar insert failed: ' + res.status);
  }
  return res.json();
}
async function gcalDeleteEvent(googleId){
  const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events/' + encodeURIComponent(googleId);

    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + accessToken }

    throw new Error('Calendar delete failed: ' + res.status);
  }
}

      .then(created=>{

          todoMeta[created.id] = { start:meta.start||'', end:meta.end||'', tag:meta.tag||'' };
          Storage.setTodoMeta(todoMeta);
          scheduleNotesSave();
        }
        return syncTasks();
      })
      .catch(err=>{ console.error(err); const e=EventsStore.addTodo(date, title); if(hasMeta){ todoMeta[e.id]={start:meta.start||'',end:meta.end||'',tag:meta.tag||''}; Storage.setTodoMeta(todoMeta); EventsStore.reattachTodoMeta(); } renderCalendar(); renderPlannerPage(AppState.selectedDate); });
  } else {
    const e = EventsStore.addTodo(date, title);
    if(hasMeta){
      todoMeta[e.id] = { start:meta.start||'', end:meta.end||'', tag:meta.tag||'' };
      Storage.setTodoMeta(todoMeta);
      EventsStore.reattachTodoMeta();
    }
    renderCalendar();
    renderPlannerPage(AppState.selectedDate);
    return Promise.resolve();
  }
}

/* 일정 제목에 완료(✓) 표시 + 유형 태그 유지하여 재구성 */
function buildSummaryDoneMark(e, done){
  const tag = (e.type !== 'etc' && TYPE_TAGS[e.type]) ? TYPE_TAGS[e.type] + ' ' : '';
  return (done ? '✓ ' : '') + tag + stripTypeTag(e.title || '');
}

/* ===== 메모 ↔ 구글 Drive 앱 전용 숨김폴더(appDataFolder) ===== */
const DRIVE_FILES  = 'https://www.googleapis.com/drive/v3/files';
const DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3/files';
const NOTES_FILENAME = 'planner-notes.json';
let notesFileId = null;
let notesSaveTimer = null;

function collectLocalNotes(){
  const o = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf('planner:note:') === 0){
      const date = k.slice('planner:note:'.length);
      const v = localStorage.getItem(k);
      if(v) o[date] = v;
    }
  }
  o._todoMeta = todoMeta;            // 할일 시간·태그 (두 기기 공유)
  o._tags = subjectTags;             // 과목 태그 목록·색
  return o;
}
function applyNotes(obj){
  Object.keys(obj || {}).forEach(key=>{
    if(key === '_todoMeta'){
      todoMeta = Object.assign({}, todoMeta, obj._todoMeta || {});
      Storage.setTodoMeta(todoMeta);
    } else if(key === '_tags'){
      if(Array.isArray(obj._tags) && obj._tags.length){
        subjectTags = obj._tags;
        Storage.setSubjectTags(subjectTags);
      }
    } else if(key.indexOf('_') !== 0 && obj[key]){
      localStorage.setItem('planner:note:'+key, obj[key]);
    }
  });
}
async function gdriveFindNotes(){
  const q = encodeURIComponent("name='" + NOTES_FILENAME + "'");
  const url = DRIVE_FILES + '?spaces=appDataFolder&q=' + q + '&fields=files(id,name)';
  const res = await fetch(url, { headers:{ Authorization:'Bearer '+accessToken } });
  if(!res.ok){
    if(res.status === 401){ accessToken=null; tokenExpiry=0; updateAuthUI(); }
    throw new Error('Drive find failed: '+res.status);
  }
  const data = await res.json();
  notesFileId = (data.files && data.files[0]) ? data.files[0].id : null;
  return notesFileId;
}
async function gdriveLoadNotes(){
  if(!isTokenValid()) return;
  try{
    if(!notesFileId) await gdriveFindNotes();
    if(!notesFileId) return;   // 아직 저장된 메모 파일 없음
    const res = await fetch(DRIVE_FILES + '/' + notesFileId + '?alt=media', { headers:{ Authorization:'Bearer '+accessToken } });
    if(!res.ok) throw new Error('Drive load failed: '+res.status);
    const obj = await res.json();
    applyNotes(obj);
    EventsStore.reattachTodoMeta();   // 불러온 시간·태그를 할일에 반영
    // 현재 보고 있는 날짜 메모/할일 즉시 반영
    renderPlannerPage(AppState.selectedDate);
  }catch(e){ console.log('메모 불러오기 건너뜀', e); }
}
async function gdriveSaveNotes(){
  if(!isTokenValid()) return;
  const content = JSON.stringify(collectLocalNotes());
  try{
    if(notesFileId === null) await gdriveFindNotes();
    if(notesFileId){
      await fetch(DRIVE_UPLOAD + '/' + notesFileId + '?uploadType=media', {
        method:'PATCH',
        headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
        body: content
      });
    } else {
      const boundary = '----planner' + Date.now();
      const meta = { name: NOTES_FILENAME, parents:['appDataFolder'] };
      const body =
        '--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+
        '\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+content+
        '\r\n--'+boundary+'--';
      const res = await fetch(DRIVE_UPLOAD + '?uploadType=multipart&fields=id', {
        method:'POST',
        headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'multipart/related; boundary='+boundary },
        body
      });
      if(res.ok){ const data = await res.json(); notesFileId = data.id; }
    }
  }catch(e){ console.log('메모 저장 건너뜀', e); }
}
function scheduleNotesSave(){
  if(!isTokenValid()) return;
  clearTimeout(notesSaveTimer);
  notesSaveTimer = setTimeout(gdriveSaveNotes, 1200);   // 입력 멈춘 뒤 저장
}
function getEventsByDate(date){ return EventsStore.getByDate(date); }
function getUpcomingEvents(fromDate, types){ return EventsStore.getUpcoming(fromDate || AppState.selectedDate, types); }

function calculateDday(eventDate, fromDate){
  const a = parseDate(fromDate || todayStr());
  const b = parseDate(eventDate);
  return Math.round((b - a) / 86400000);
}
function ddayLabel(n){ return n === 0 ? "D-DAY" : (n > 0 ? `D-${n}` : `D+${Math.abs(n)}`); }

function renderCalendar(){
  const {year, month} = AppState.view;
  document.getElementById('calTitle').textContent = `${year}. ${month+1}`;
  const wrap = document.getElementById('calDays');
  wrap.innerHTML = '';

  const first = new Date(year, month, 1).getDay();
  const days  = new Date(year, month+1, 0).getDate();

  // 일정이 있는 날짜 집합
  const evtDates = new Set(EventsStore.getAll()
    .filter(e => e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`))
    .map(e => e.date));

  for(let i=0;i<first;i++){
    const c=document.createElement('div'); c.className='day empty'; wrap.appendChild(c);
  }
  for(let d=1; d<=days; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month, d).getDay();
    const cell = document.createElement('div');
    cell.className = 'day' + (dow===0?' sun':'') + (dow===6?' sat':'');
    if(dateStr === todayStr())            cell.classList.add('today');
    if(dateStr === AppState.selectedDate) cell.classList.add('selected');
    cell.textContent = d;
    if(evtDates.has(dateStr)){ const dot=document.createElement('span'); dot.className='dot'; cell.appendChild(dot); }
    cell.addEventListener('click', ()=>{ AppState.selectedDate = dateStr; renderCalendar(); renderPlannerPage(dateStr); });
    wrap.appendChild(cell);
  }
}

function renderPlannerPage(date){
  const events = getEventsByDate(date);
  const d = parseDate(date);

  /* DATE */
  document.getElementById('fDate').textContent =
    `${date.replace(/-/g,'. ')} (${WK[d.getDay()]})`;

  /* CONTENTS — 그날 일정 요약 */
  const counts = {exam:0, assignment:0, etc:0, custom:0, todo:0};
  events.forEach(e => counts[e.type]++);
  const contentsEl = document.getElementById('fContents');
  if(events.length){
    const parts = [];
    if(counts.exam)       parts.push(`시험 ${counts.exam}`);
    if(counts.assignment) parts.push(`과제 ${counts.assignment}`);
    if(counts.etc)        parts.push(`기타 ${counts.etc}`);
    if(counts.custom)     parts.push(`개인 ${counts.custom}`);
    if(counts.todo)       parts.push(`할일 ${counts.todo}`);
    contentsEl.innerHTML = `오늘 항목 <b>${events.length}개</b> · ${parts.join(' · ')}`;
  } else {
    contentsEl.innerHTML = `<span style="color:#B6C5D0">등록된 일정 없음</span>`;
  }

  /* TOTAL — 완료 현황 + 할일 누적시간(태그별/전체) */
  const doneCount = events.filter(e => e.done).length;
  // 일정(시간블록) 총합은 참고용으로 유지
  let blockMin = 0;
  events.forEach(e => { if(e.type!=='todo' && e.startTime && e.endTime) blockMin += toMin(e.endTime) - toMin(e.startTime); });
  // 할일 누적시간: 태그별 합산 + 완료 시간
  const tagMin = {};
  let todoMin = 0, doneMin = 0;
  events.forEach(e => {
    if(e.type==='todo' && e.startTime && e.endTime){
      const d = toMin(e.endTime) - toMin(e.startTime);
      if(d > 0){ const tg = e.tag || '기타'; tagMin[tg] = (tagMin[tg]||0) + d; todoMin += d; if(e.done) doneMin += d; }
    }
  });
  const fmtDur = (mins)=>{ const h=Math.floor(mins/60), m=mins%60; return `${h?h+'h':''}${m?m+'m':(h?'':'0m')}`; };
  const totalEl = document.getElementById('fTotal');
  if(events.length){
    let html = `완료 <b>${doneCount} / ${events.length}</b>`;
    if(todoMin > 0){
      const pct = Math.round((doneMin/todoMin)*100);
      html += `<div class="total-study">할일 진행 <b>${fmtDur(doneMin)}</b> / ${fmtDur(todoMin)} <span class="study-pct">(${pct}%)</span></div>`;
      html += `<div class="study-bar"><div class="study-bar-fill" style="width:${pct}%"></div></div>`;
      const parts = Object.keys(tagMin).map(tg =>
        `<span class="ts-tag"><i style="background:${tagColor(tg)}"></i>${tg} ${fmtDur(tagMin[tg])}</span>`
      ).join('');
      html += `<div class="total-bytag">${parts}</div>`;
    }
    totalEl.innerHTML = html;
  } else {
    totalEl.innerHTML = '';
  }

  /* D-DAY — 선택일 기준 가장 가까운 주요 일정 (시험·과제·기타 우선, 개인 일정 제외) */
  renderDday(date);

  /* TASK — 그날 일정 목록을 줄 위에 표시 */
  renderTask(events);

  /* MEMO — 저장소에서 불러와 표시 */
  const note = Storage.getDayNote(date);
  document.getElementById('fMemo').textContent = note;
  document.getElementById('fMemoMobile').textContent = note;

  /* TIME TABLE */
  renderTimeTable(events);

  /* 공부시간 통계 (가로 전용) 갱신 */
  if(typeof renderStats === 'function') renderStats();
}

function renderDday(date){
  const upcoming = getUpcomingEvents(date, ['exam','assignment','present','etc']);
  const el = document.getElementById('fDday');
  if(!upcoming.length){ el.innerHTML = `<div class="val empty-line"></div>`; return; }

  const head = upcoming[0];
  const rest = upcoming.slice(1);     // 나머지 전부 (영역은 스크롤로 고정)
  let html = `<div class="dday-main">
      <span class="dday-tag">${ddayLabel(calculateDday(head.date, date))}</span>
      <span class="dd-dot" style="background:${TYPE_COLOR[head.type]||TYPE_COLOR.etc}"></span>
      <span class="dday-title">${displayTitle(head)}</span>
    </div>`;
  if(rest.length){
    html += `<ul class="dday-list">` + rest.map(e =>
      `<li><span class="dl-tag">${ddayLabel(calculateDday(e.date, date))}</span>`
      + `<span class="dd-dot" style="background:${TYPE_COLOR[e.type]||TYPE_COLOR.etc}"></span>`
      + `${displayTitle(e)}</li>`
    ).join('') + `</ul>`;
  }
  el.innerHTML = html;
}

/* 한 항목(line) DOM 생성 — 일정/할일 공용 */
function buildTaskLine(e, showBadge){
  const line = document.createElement('div');
  line.className = 'task-line' + (e.done ? ' done' : '');
  const timeTxt = (e.startTime && e.endTime) ? `${e.startTime}~${e.endTime}` : '';

  const chk = document.createElement('span');
  chk.className = 'chk' + (e.done ? ' checked' : '');
  chk.title = '완료 체크 / 해제';
  ['mousedown','touchstart'].forEach(ev => chk.addEventListener(ev, x=>x.stopPropagation()));
  chk.addEventListener('click', (x)=>{
    x.stopPropagation();
    if(e.source === 'google-tasks' && isTokenValid()){
      // 구글 할일 → Tasks 완료 상태 변경 후 갱신
      e.done = !e.done;                       // 즉시 화면 반영
      chk.classList.toggle('checked', e.done);
      line.classList.toggle('done', e.done);
      gtaskSetDone(e.id, e.done).then(()=> syncTasks()).catch(err=> console.error(err));
      if(typeof renderStats === 'function') renderStats();
    } else if(e.source === 'google-calendar' && isTokenValid()){
      // 구글 일정 → 제목에 ✓ 표시 토글(두 기기 공유)
      e.done = !e.done;
      chk.classList.toggle('checked', e.done);
      line.classList.toggle('done', e.done);
      if(e.done) EventsStore.doneMap[e.id] = true; else delete EventsStore.doneMap[e.id];
      Storage.setDoneMap(EventsStore.doneMap);
      gcalPatchEvent(e.id, { summary: buildSummaryDoneMark(e, e.done) }).catch(err=> console.error(err));
    } else {
      EventsStore.toggleDone(e.id);
      renderPlannerPage(AppState.selectedDate);
    }
  });
  line.appendChild(chk);

  if(showBadge){
    const badge = document.createElement('span');
    badge.className = 'badge editable ' + e.type;
    badge.textContent = (e.type==='custom' && e.customType) ? e.customType : TYPE_LABEL[e.type];
    badge.title = '유형 변경';
    ['mousedown','touchstart'].forEach(ev => badge.addEventListener(ev, x=>x.stopPropagation()));
    badge.addEventListener('click', (x)=>{ x.stopPropagation(); openTypePicker(e); });
    line.appendChild(badge);
  }

  if(!showBadge && e.type === 'todo' && e.tag){
    const dot = document.createElement('span');
    dot.className = 'tag-dot';
    dot.style.background = tagColor(e.tag);
    dot.title = e.tag;
    line.appendChild(dot);
  }

  const title = document.createElement('span');
  title.className = 't-title';
  title.textContent = e.title;
  if(!showBadge && e.type === 'todo'){
    title.style.cursor = 'pointer';
    title.title = '탭하여 수정';
    title.addEventListener('click', (x)=>{ x.stopPropagation(); openTodoEdit(e); });
  }
  line.appendChild(title);

  if(timeTxt){
    const tm = document.createElement('span');
    tm.className = 't-time';
    tm.textContent = timeTxt;
    line.appendChild(tm);
  }

  const doDelete = ()=>{
    if(!confirm(`"${e.title}" 항목을 삭제할까요?`)) return;
    if(e.source === 'google-calendar' && isTokenValid()){
      // 구글 일정 → 구글에서 삭제 후 다시 동기화
      setSyncStatus('구글에서 삭제 중…');
      gcalDeleteEvent(e.id)
        .then(()=> syncFromGoogle())
        .catch(err=>{ console.error(err); setSyncStatus('구글 삭제 실패 — 다시 시도', true); });
    } else if(e.source === 'google-tasks' && isTokenValid()){
      // 구글 할일 → Tasks에서 삭제 후 갱신
      gtaskDelete(e.id).then(()=> syncTasks()).catch(err=> console.error(err));
    } else {
      // 로컬 항목(할일·로컬 일정) → 로컬 삭제
      EventsStore.removeEvent(e.id);
      renderCalendar();
      renderPlannerPage(AppState.selectedDate);
    }
  };
  const del = document.createElement('span');
  del.className = 'del-x'; del.textContent = '×'; del.title = '삭제';
  ['mousedown','touchstart'].forEach(ev => del.addEventListener(ev, x=>x.stopPropagation()));
  del.addEventListener('click', (x)=>{ x.stopPropagation(); doDelete(); });
  line.appendChild(del);

  attachLongPress(line, doDelete);
  return line;
}

function sortItems(arr){
  return arr.slice().sort((a,b)=>{
    if(!!a.done !== !!b.done) return a.done ? 1 : -1;
    const ta=a.startTime||'99:99', tb=b.startTime||'99:99';
    return ta===tb ? TYPE_PRIORITY[a.type]-TYPE_PRIORITY[b.type] : ta.localeCompare(tb);
  });
}
function fillEmptyLines(wrap, used, min){
  for(let i=used; i<min; i++){
    const empty = document.createElement('div');
    empty.className = 'task-line';
    wrap.appendChild(empty);
  }
}

function renderTask(events){
  const tdWrap = document.getElementById('fTaskTodo');
  tdWrap.innerHTML = '';

  const todoItems = sortItems(events.filter(e => e.type === 'todo'));  // 할일만

  todoItems.forEach(e => tdWrap.appendChild(buildTaskLine(e, false)));

  const inputLine = document.createElement('div');
  inputLine.className = 'task-line input-line';
  const mark = document.createElement('span');
  mark.className = 'quick-mark'; mark.textContent = '+';
  const input = document.createElement('input');
  input.className = 'quick-input';
  input.type = 'text';
  input.placeholder = '할일 입력 후 Enter';
  input.addEventListener('keydown', (ev)=>{
    if(ev.key === 'Enter' && input.value.trim()){

        .then(()=>{ const qi=document.querySelector('#fTaskTodo .quick-input'); if(qi) qi.focus(); });

function renderTimeTable(events){
  const wrap = document.getElementById('fTime');
  // 6시 ~ 다음날 3시 (총 22행). 라벨: 6..12, 1..12, 1..3
  const hours = [];
  for(let h=6; h<=24+3; h++) hours.push(((h-1)%12)+1);

  let rows = '';
  hours.forEach(label => {
    rows += `<div class="tt-row"><span class="tt-h">${label}</span><div class="tt-cells"></div></div>`;
  });

  // 이벤트 블록 (10분 단위 정밀 배치, 06:00 기준)
  const SPAN = 22 * 60;                       // 06:00 → 04:00 = 1320분
  let blocks = '';
  events.filter(e => e.startTime && e.endTime).forEach(e => {
    const s = minutesSince6(e.startTime);
    const en = minutesSince6(e.endTime);
    if(s == null || en == null || en <= s) return;
    const top = (s/SPAN)*100;
    const hgt = ((en-s)/SPAN)*100;
    const isTodo = e.type === 'todo';
    const bg = isTodo ? `background:${tagColor(e.tag||'기타')};` : '';
    const cls = isTodo ? 'todo' : e.type;
    const label = isTodo && e.tag ? `${e.tag} · ${displayTitle(e)}` : displayTitle(e);
    blocks += `<div class="tt-block ${cls}${e.done?' done':''}" style="top:${top}%;height:${hgt}%;${bg}">
        <div class="b-title">${label}</div>
        <div class="b-time">${e.startTime}–${e.endTime}</div>
      </div>`;
  });

  wrap.innerHTML = `<div class="tt-grid">${rows}<div class="tt-blocks">${blocks}</div></div>`;
}

/* ---------- 보조 함수 ---------- */
function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function minutesSince6(t){
  const v = toMin(t);
  return ((v - 360) + 1440) % 1440;   // 06:00=0 / 새벽시간은 아래쪽으로
}
function displayTitle(e){
  return e.type==='custom' && e.customType ? `${e.title}` : e.title;
}

/* 길게 누르기 (터치/마우스 공통) — 삭제 트리거 */
function attachLongPress(el, onLong){
  let timer = null;
  const start = ()=>{
    el.classList.add('pressing');
    timer = setTimeout(()=>{ el.classList.remove('pressing'); onLong(); }, 550);
  };
  const cancel = ()=>{ clearTimeout(timer); el.classList.remove('pressing'); };
  el.addEventListener('touchstart', start, {passive:true});
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchmove', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

/* ---------- 구글 연동 동작 ---------- */
function setSyncStatus(msg, isErr){
  const el = document.getElementById('gcalStatus');
  el.textContent = msg || '';
  el.classList.toggle('err', !!isErr);
}
function updateAuthUI(){
  const btn = document.getElementById('gcalBtn');
  if(accessToken){
    btn.textContent = '구글 캘린더 연결 해제';
    btn.classList.add('connected');
  } else {
    btn.textContent = '구글 캘린더 연결';
    btn.classList.remove('connected');
  }
}
function initGoogleAuth(){
  if(!(window.google && google.accounts && google.accounts.oauth2)){
    return setTimeout(initGoogleAuth, 300);   // 스크립트 로딩 대기
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPE,
    callback: (resp)=>{
      if(resp && resp.error){
        // 조용한 재연결 실패 등
        setSyncStatus('다시 연결이 필요해요', true);
        return;
      }
      accessToken = resp.access_token;
      saveToken(resp.access_token, resp.expires_in);
      updateAuthUI();
      syncFromGoogle();
    }
  });
  updateAuthUI();
  // 이전에 연결했었는데 저장된 토큰이 만료됐으면 → 조용히 재연결 시도(터치 없이)
  if(!isTokenValid() && wasConnected()){
    setSyncStatus('자동 재연결 중…');
    try{ tokenClient.requestAccessToken({ prompt: '' }); }catch(e){}
  }
}
function isTokenValid(){ return !!accessToken && tokenExpiry > Date.now() + 30000; }
function signIn(){
  if(!tokenClient){ setSyncStatus('잠시 후 다시 시도'); initGoogleAuth(); return; }
  tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
}
function signOut(){
  if(accessToken && window.google && google.accounts && google.accounts.oauth2){
    google.accounts.oauth2.revoke(accessToken, ()=>{});
  }
  accessToken = null; tokenExpiry = 0;
  clearToken();
  EventsStore.setGoogleEvents([]);
  EventsStore.setGoogleTasks([]);
  updateAuthUI();
  setSyncStatus('');
  renderCalendar();
  renderPlannerPage(AppState.selectedDate);
}
async function syncFromGoogle(){
  // 토큰 없거나 만료 → 조용히 재연결 시도
  if(!isTokenValid()){
    if(tokenClient && wasConnected()){ setSyncStatus('자동 재연결 중…'); tokenClient.requestAccessToken({ prompt: '' }); }
    else { setSyncStatus('구글 캘린더를 연결하세요'); }
    return;
  }
  const {year, month} = AppState.view;
  const min = new Date(year, month-1, 1).toISOString();   // 한 달 전부터
  const max = new Date(year, month+2, 1).toISOString();   // 두 달 후까지
  const refreshBtn = document.getElementById('gcalRefresh');
  try{
    refreshBtn.classList.add('spin');
    setSyncStatus('동기화 중…');
    const events = await fetchGoogleCalendarEvents(min, max);
    EventsStore.setGoogleEvents(events);
    // 할일(Tasks)도 함께 (권한 없으면 조용히 건너뜀)
    let taskCount = 0;
    try{ const tasks = await gtasksList(); EventsStore.setGoogleTasks(tasks); taskCount = tasks.length; }
    catch(te){ console.log('Tasks 동기화 건너뜀', te); }
    // 메모(Drive 숨김폴더)도 함께 불러오기
    gdriveLoadNotes();
    setSyncStatus(`구글 연결됨 · 일정 ${events.length} · 할일 ${taskCount}`);
    renderCalendar();
    renderPlannerPage(AppState.selectedDate);
  }catch(err){
    console.error(err);
    setSyncStatus('동기화 실패 — 새로고침을 눌러보세요', true);
  }finally{
    refreshBtn.classList.remove('spin');
  }
}
document.getElementById('gcalBtn').addEventListener('click', ()=>{
  if(accessToken) signOut(); else signIn();
});
document.getElementById('gcalRefresh').addEventListener('click', ()=>{
  if(isTokenValid()) syncFromGoogle();
  else if(wasConnected() && tokenClient) tokenClient.requestAccessToken({ prompt: '' });
  else signIn();
});

 *  포스트잇 (가로 전용 · 로컬 저장, 동기화 X)

const POSTIT_COLORS = ['#FDE68A','#BFE3F2','#FBCFE8','#C8E6C9','#E9E4D8'];
let postits = [];
let pdrag = null;
function loadPostits(){ try{ postits = JSON.parse(localStorage.getItem('planner:postits')||'[]'); }catch(e){ postits=[]; } }
function savePostits(){ try{ localStorage.setItem('planner:postits', JSON.stringify(postits)); }catch(e){} }
function renderPostits(){
  const area = document.getElementById('postitArea');
  if(!area) return;
  area.innerHTML = '<div class="pa-head"><span>Post-it</span><button class="add-btn" id="addPostit">+ 포스트잇</button></div>';
  postits.forEach(p=>{
    const card = document.createElement('div');
    card.className = 'postit';
    card.style.background = p.color;
    card.style.left = (p.x||16)+'px';
    card.style.top  = (p.y||46)+'px';

    // 넓은 이동 핸들 바
    const grip = document.createElement('div'); grip.className = 'grip'; grip.textContent = '• • •'; grip.title = '드래그하여 이동';

    const pin = document.createElement('div'); pin.className = 'pin';
    const colors = document.createElement('div'); colors.className = 'colors';
    POSTIT_COLORS.forEach(c=>{
      const d = document.createElement('span'); d.className = 'cdot'; d.style.background = c;
      ['mousedown','touchstart'].forEach(ev => d.addEventListener(ev, x=>x.stopPropagation()));
      d.addEventListener('click', (e)=>{ e.stopPropagation(); p.color = c; card.style.background = c; savePostits(); });
      colors.appendChild(d);
    });
    const del = document.createElement('span'); del.className = 'del'; del.textContent = '×';
    ['mousedown','touchstart'].forEach(ev => del.addEventListener(ev, x=>x.stopPropagation()));
    del.addEventListener('click', (e)=>{ e.stopPropagation(); postits = postits.filter(x=>x.id!==p.id); savePostits(); renderPostits(); });
    pin.appendChild(colors); pin.appendChild(del);

    const ta = document.createElement('textarea'); ta.value = p.text||''; ta.placeholder = '메모...';
    ta.addEventListener('input', ()=>{ p.text = ta.value; savePostits(); });

    card.appendChild(grip); card.appendChild(pin); card.appendChild(ta);
    grip.addEventListener('mousedown', (e)=> startPDrag(e, card, p, area));
    grip.addEventListener('touchstart', (e)=> startPDrag(e, card, p, area), {passive:false});
    area.appendChild(card);
  });
  const addBtn = document.getElementById('addPostit');
  if(addBtn) addBtn.addEventListener('click', addPostit);
}
function addPostit(){
  const n = postits.length;
  postits.push({ id:'p-'+Date.now(), text:'', color:POSTIT_COLORS[n%POSTIT_COLORS.length], x:16+(n%3)*20, y:48+(n%4)*16 });
  savePostits(); renderPostits();
  const tas = document.querySelectorAll('#postitArea .postit textarea');
  if(tas.length) tas[tas.length-1].focus();
}
function startPDrag(e, card, p, area){
  const t = e.touches ? e.touches[0] : e;
  pdrag = { card, p, area, sx:t.clientX, sy:t.clientY, ox:card.offsetLeft, oy:card.offsetTop };
  card.style.zIndex = 5;
  if(e.cancelable) e.preventDefault();
}
function movePDrag(e){
  if(!pdrag) return;
  const t = e.touches ? e.touches[0] : e;
  let nx = pdrag.ox + (t.clientX - pdrag.sx);
  let ny = pdrag.oy + (t.clientY - pdrag.sy);
  nx = Math.max(4, Math.min(nx, pdrag.area.clientWidth  - pdrag.card.offsetWidth  - 4));
  ny = Math.max(40, Math.min(ny, pdrag.area.clientHeight - pdrag.card.offsetHeight - 4));
  pdrag.card.style.left = nx+'px';
  pdrag.card.style.top  = ny+'px';
  if(e.cancelable) e.preventDefault();
}
function endPDrag(){
  if(!pdrag) return;
  pdrag.p.x = pdrag.card.offsetLeft;
  pdrag.p.y = pdrag.card.offsetTop;
  pdrag.card.style.zIndex = 1;
  savePostits();
  pdrag = null;
}
window.addEventListener('mousemove', movePDrag);
window.addEventListener('mouseup', endPDrag);
window.addEventListener('touchmove', movePDrag, {passive:false});
window.addEventListener('touchend', endPDrag);

/* ============================================================================
 *  공부시간 통계 (가로 전용 · 할일 시작~종료 시간을 태그별 합산 · 주간/월간)
 * ========================================================================== */
let statsRange = 'week';   // 'week' | 'month'
function studyAggregate(range){
  // 기준: 선택일이 속한 주(월~일) 또는 달
  const base = parseDate(AppState.selectedDate);
  let from, to;
  if(range === "month"){
    from = new Date(base.getFullYear(), base.getMonth(), 1);
    to   = new Date(base.getFullYear(), base.getMonth()+1, 0);
  } else {
    const dow = (base.getDay()+6)%7;   // 월=0
    from = new Date(base); from.setDate(base.getDate()-dow);
    to   = new Date(from); to.setDate(from.getDate()+6);
  }
  const fromS = fmt(from), toS = fmt(to);
  // 기간 라벨
  let label;
  if(range === "month"){
    label = (base.getMonth()+1) + "월";
  } else {
    // 그 주 목요일이 속한 달 기준 주차(ISO식 근사): 해당 달에서 몇 번째 주인지
    const thu = new Date(from); thu.setDate(from.getDate()+3);   // 주의 목요일
    const firstThu = new Date(thu.getFullYear(), thu.getMonth(), 1);
    const wk = Math.ceil((thu.getDate() + ((firstThu.getDay()+6)%7)) / 7);
    label = (thu.getMonth()+1) + "월 " + wk + "주차";
  }
  const all = EventsStore.getAll();
  const tagMin = {}; let total = 0;
  all.forEach(e=>{
    if(e.type==="todo" && e.done && e.startTime && e.endTime && e.date >= fromS && e.date <= toS){
      const d = toMin(e.endTime) - toMin(e.startTime);
      if(d>0){ const tg = e.tag || "기타"; tagMin[tg]=(tagMin[tg]||0)+d; total+=d; }
    }
  });
  return { tagMin, total, fromS, toS, label };
}
function renderStats(){
  const area = document.getElementById("statsArea");
  if(!area) return;
  const { tagMin, total, label } = studyAggregate(statsRange);
  const fmtDur = (m)=>{ const h=Math.floor(m/60), mm=m%60; return `${h?h+"h":""}${mm?mm+"m":(h?"":"0m")}`; };
  let body;
  if(total <= 0){
    body = `<div class="st-empty">이 기간에 기록된<br>공부시간이 없어요.<br><br>할일에 시작~종료 시간을 넣으면<br>태그별로 합산돼요.</div>`;
  } else {
    const max = Math.max.apply(null, Object.values(tagMin));
    const rows = Object.keys(tagMin).sort((a,b)=>tagMin[b]-tagMin[a]).map(tg=>{
      const pct = Math.round((tagMin[tg]/max)*100);
      return `<div class="st-bar-row">`
        + `<div class="st-bar-top"><span>${tg}</span><span>${fmtDur(tagMin[tg])}</span></div>`
        + `<div class="st-bar-track"><div class="st-bar-fill" style="width:${pct}%;background:${tagColor(tg)}"></div></div>`
        + `</div>`;
    }).join("");
    body = `<div class="st-total">총 <b>${fmtDur(total)}</b></div>` + rows;
  }
  area.innerHTML =
    `<div class="st-head">`
    + `<span class="st-title">Study Time<em class="st-period">${label}</em></span>`
    + `<span class="st-toggle">`
    + `<button data-r="week" class="${statsRange==="week"?"active":""}">주간</button>`
    + `<button data-r="month" class="${statsRange==="month"?"active":""}">월간</button>`
    + `</span></div>`
    + `<div class="st-body">${body}</div>`;
  area.querySelectorAll(".st-toggle button").forEach(b=>{
    b.addEventListener("click", ()=>{ statsRange = b.dataset.r; renderStats(); });
  });
}

/* 초기화 */
(function init(){
  EventsStore.load();                  // 저장된 사용자 일정 + 완료 상태 불러오기
  typeOverrides = Storage.getTypeMap();   // 사용자가 지정한 유형 불러오기
  todoMeta = Storage.getTodoMeta();       // 할일 시간·태그
  const savedTags = Storage.getSubjectTags();
  if(savedTags && savedTags.length) subjectTags = savedTags;
  EventsStore.reattachTodoMeta();
  const t = parseDate(todayStr());
  AppState.view = { year: t.getFullYear(), month: t.getMonth() };
  renderCalendar();
  renderPlannerPage(AppState.selectedDate);
  loadPostits(); renderPostits();      // 포스트잇 (가로 전용)
  renderStats();                       // 공부시간 통계 (가로 전용)

  loadToken();                         // 저장된 토큰 복원
  if(isTokenValid()){                  // 유효하면 바로 동기화 (터치/팝업 없음)
    updateAuthUI();
    syncFromGoogle();
  }
  initGoogleAuth();                    // 구글 로그인 준비 (+ 필요시 조용한 재연결)
})();

/* PWA: 서비스워커 등록 (홈화면 설치 + 오프라인) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(err=> console.log('SW 등록 실패', err));
  });
}
</script>
